name: Deploy Vue to GitHub Pages

on:
  push:
    branches:
      - main # 如果你默认分支叫 master，改成 master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # 👇 关键修改：上传构建产物，供 Pages 服务使用
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 👇 关键修改：部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # 注意：这里不需要再指定 publish_dir，因为上一步已经上传了
