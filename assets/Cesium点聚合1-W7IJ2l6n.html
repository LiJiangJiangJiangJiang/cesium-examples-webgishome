<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ljgis</title>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
      });
      const arr = [];
      for (let i = 0; i < 50; i++) {
        arr.push({
          x: 114 + Math.random(),
          y: 30 + Math.random(),
        });
      }

      function createEntity(poi) {
        const { x, y, z } = poi;
        const entity = new Cesium.Entity({
          position: Cesium.Cartesian3.fromDegrees(x, y, z),
          point: {
            pixelSize: 10,
            color: Cesium.Color.BLUE,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
          },
        });
        return entity;
      }

      function customStyle(clusterLayer) {
        let pinBuilder = new Cesium.PinBuilder();
        let pin50 = pinBuilder
          .fromText("50+", Cesium.Color.RED, 48)
          .toDataURL();
        let pin40 = pinBuilder
          .fromText("40+", Cesium.Color.ORANGE, 48)
          .toDataURL();
        let pin30 = pinBuilder
          .fromText("30+", Cesium.Color.YELLOW, 48)
          .toDataURL();
        let pin20 = pinBuilder
          .fromText("20+", Cesium.Color.GREEN, 48)
          .toDataURL();
        let pin10 = pinBuilder
          .fromText("10+", Cesium.Color.BLUE, 48)
          .toDataURL();

        let singleDigitPins = new Array(9);
        for (let i = 0; i < singleDigitPins.length; ++i) {
          singleDigitPins[i] = pinBuilder
            .fromText(`${i + 1}`, Cesium.Color.VIOLET, 48)
            .toDataURL();
        }
        clusterLayer.clustering.clusterEvent.addEventListener(
          (clusteredEntities, cluster) => {
            cluster.label.show = false;

            if (clusteredEntities.length >= 50) {
              cluster.billboard.image = pin50;
            } else if (clusteredEntities.length >= 40) {
              cluster.billboard.image = pin40;
            } else if (clusteredEntities.length >= 30) {
              cluster.billboard.image = pin30;
            } else if (clusteredEntities.length >= 20) {
              cluster.billboard.image = pin20;
            } else if (clusteredEntities.length >= 10) {
              cluster.billboard.image = pin10;
            } else {
              cluster.billboard.image =
                singleDigitPins[clusteredEntities.length - 1];
            }
          },
        );

        let pixelRange = clusterLayer.clustering.pixelRange;
        clusterLayer.clustering.pixelRange = 0;
        clusterLayer.clustering.pixelRange = pixelRange;
      }

      function addData(pois) {
        if (pois instanceof Array) {
          const clusterLayer = new Cesium.CustomDataSource();
          pois.forEach((element) => {
            const entity = createEntity(element);
            clusterLayer.entities.add(entity);
          });
          clusterLayer.clustering.enabled = true;
          clusterLayer.clustering.pixelRange = 15;
          clusterLayer.clustering.minimumClusterSize = 3;
          customStyle(clusterLayer);
          viewer.dataSources.add(clusterLayer);
        } else {
          console.error("参数错误");
        }
      }
      addData(arr);

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(114.5, 30.5, 1050000),
      });
    </script>
  </body>
</html>
