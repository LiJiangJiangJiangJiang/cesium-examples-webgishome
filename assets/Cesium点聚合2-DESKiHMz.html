<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cesium 点聚合2</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
      });

      class ClusterManager {
        constructor(viewer) {
          this.viewer = viewer;
          this.entities = [];
          this.clusterEntities = [];
          this.minimumClusterSize = 2; // 最少聚合点数
          this.clusterDistance = 80; // 聚合像素距离
        }

        addPoints(data) {
          data.forEach((item) => {
            const e = this.viewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(item.lng, item.lat, 0),
              billboard: {
                image: "https://data.mars3d.cn/img/marker/mark-blue.png",
                scale: 0.6,
                disableDepthTestDistance: Number.POSITIVE_INFINITY,
              },
              data: item,
            });
            this.entities.push(e);
          });
          this.update();
        }

        createClusterIcon(count) {
          const sizes =
            count < 10
              ? { color: "#6ecc39", radius: 24 }
              : count < 100
                ? { color: "#f0c20c", radius: 28 }
                : { color: "#f18017", radius: 32 };

          const canvas = document.createElement("canvas");
          const size = sizes.radius * 2;
          canvas.width = canvas.height = size;

          const ctx = canvas.getContext("2d");
          ctx.beginPath();
          ctx.arc(sizes.radius, sizes.radius, sizes.radius, 0, Math.PI * 2);
          ctx.fillStyle = sizes.color;
          ctx.fill();

          ctx.font = `bold ${sizes.radius * 0.6}px Arial`;
          ctx.fillStyle = "white";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(count, sizes.radius, sizes.radius);

          return canvas.toDataURL();
        }

        // 聚合核心算法
        update() {
          this.clearClusterEntities();
          const scene = this.viewer.scene;
          const now = Cesium.JulianDate.now();
          const groups = new Map();

          // 1. 坐标转换与分组
          for (const e of this.entities) {
            const pos = e.position.getValue(now);
            if (!pos) continue;

            const screen = scene.cartesianToCanvasCoordinates(pos);
            if (!screen) continue;

            const keyX = Math.round(screen.x / this.clusterDistance);
            const keyY = Math.round(screen.y / this.clusterDistance);
            const key = `${keyX}_${keyY}`;

            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push({ entity: e, position: pos });
          }

          // 2. 创建聚合点
          for (const [_, items] of groups) {
            if (items.length >= this.minimumClusterSize) {
              items.forEach((i) => (i.entity.billboard.show = false));

              const center = this.computeCenter(items.map((i) => i.position));
              const cluster = this.viewer.entities.add({
                position: center,
                billboard: {
                  image: this.createClusterIcon(items.length),
                  disableDepthTestDistance: Number.POSITIVE_INFINITY,
                },
                clusterData: {
                  count: items.length,
                  entities: items.map((i) => i.entity),
                },
              });
              this.clusterEntities.push(cluster);
            } else {
              items[0].entity.billboard.show = true;
            }
          }
        }

        computeCenter(positions) {
          const total = positions.length;
          const sum = positions.reduce(
            (a, b) => new Cesium.Cartesian3(a.x + b.x, a.y + b.y, a.z + b.z),
          );
          return new Cesium.Cartesian3(
            sum.x / total,
            sum.y / total,
            sum.z / total,
          );
        }

        clearClusterEntities() {
          this.clusterEntities.forEach((e) => this.viewer.entities.remove(e));
          this.clusterEntities = [];
        }
      }

      // 初始化
      const cluster = new ClusterManager(viewer);

      // 相机移动时更新聚合
      viewer.camera.changed.addEventListener(() => cluster.update());

      // 加载数据
      (async () => {
        const res = await fetch(
          "https://data.mars3d.cn/file/apidemo/mudi.json",
        );
        const json = await res.json();
        cluster.addPoints(json.data);
      })();
    </script>
  </body>
</html>
