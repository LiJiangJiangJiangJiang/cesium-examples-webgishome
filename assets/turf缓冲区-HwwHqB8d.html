<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Cesium 缓冲区动态演示</title>

    <!-- Cesium -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />

    <!-- Turf -->
    <script src="https://unpkg.com/@turf/turf@6.3.0/turf.min.js"></script>

    <!-- dat.GUI -->
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>

    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      (async function () {
        const viewer = new Cesium.Viewer("cesiumContainer", {
          animation: false,
          timeline: false,
          baseLayerPicker: false,
          infoBox: false,
          selectionIndicator: false,
          terrainProvider: await Cesium.createWorldTerrainAsync(),
        });

        /* =========================
           原始几何数据
        ========================= */
        const pointPosition = [95.25148354298994, 33.43671442402564];
        const polylinePosition = [
          [102.77305933312431, 32.30571264876045],
          [100.79873887988504, 29.589742736893342],
          [104.09057731013843, 27.589909088875146],
        ];
        const polygonPosition = [
          [
            [108.84162890875109, 33.83381858276036],
            [107.73067878549728, 30.686905116310314],
            [112.43022833317082, 29.34147880925039],
            [116.51604766262409, 31.71085905001513],
            [108.84162890875109, 33.83381858276036],
          ],
        ];

        /* =========================
           原始点线面（始终不透明）
        ========================= */
        function addOriginalEntities() {
          viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(...pointPosition),
            point: {
              color: Cesium.Color.RED,
              pixelSize: 10,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 2,
            },
          });

          viewer.entities.add({
            polyline: {
              positions: Cesium.Cartesian3.fromDegreesArray(
                polylinePosition.flat(),
              ),
              width: 4,
              material: Cesium.Color.RED,
              clampToGround: true,
            },
          });

          viewer.entities.add({
            polygon: {
              hierarchy: Cesium.Cartesian3.fromDegreesArray(
                polygonPosition[0].flat(),
              ),
              material: Cesium.Color.RED.withAlpha(1.0),
              outline: true,
              outlineColor: Cesium.Color.RED,
            },
          });
        }

        addOriginalEntities();

        /* =========================
           GUI 参数
        ========================= */
        const guiParams = {
          缓冲区距离: 100,
          填充颜色: "#00ffff",
        };

        let bufferDataSource = null;
        let isFirstLoad = true;

        /* =========================
           生成 GeoJSON
        ========================= */
        function createBufferGeoJSON(distanceKm) {
          return {
            type: "FeatureCollection",
            features: [
              {
                type: "Feature",
                geometry: turf.buffer(turf.point(pointPosition), distanceKm, {
                  units: "kilometers",
                }).geometry,
              },
              {
                type: "Feature",
                geometry: turf.buffer(
                  turf.lineString(polylinePosition),
                  distanceKm,
                  { units: "kilometers" },
                ).geometry,
              },
              {
                type: "Feature",
                geometry: turf.buffer(
                  turf.polygon(polygonPosition),
                  distanceKm,
                  { units: "kilometers" },
                ).geometry,
              },
            ],
          };
        }

        /* =========================
           更新缓冲区
        ========================= */
        async function updateBuffer() {
          const geojson = createBufferGeoJSON(guiParams.缓冲区距离);
          const fill = Cesium.Color.fromCssColorString(
            guiParams.填充颜色,
          ).withAlpha(0.35);

          if (bufferDataSource) {
            viewer.dataSources.remove(bufferDataSource);
          }

          bufferDataSource = await Cesium.GeoJsonDataSource.load(geojson, {
            stroke: fill,
            strokeWidth: 1,
            fill: fill,
            clampToGround: true,
          });

          viewer.dataSources.add(bufferDataSource);

          if (isFirstLoad) {
            viewer.zoomTo(bufferDataSource);
            isFirstLoad = false;
          }
        }

        /* =========================
           dat.GUI（中文）
        ========================= */
        const gui = new dat.GUI();
        gui.add(guiParams, "缓冲区距离", 1, 300).name("缓冲区距离（km）");
        gui.addColor(guiParams, "填充颜色").name("填充颜色");

        gui.__controllers.forEach((c) => {
          c.onFinishChange(updateBuffer);
        });

        updateBuffer();
      })();
    </script>
  </body>
</html>
