<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS Home</title>

    <script src="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/ol.css"
    />

    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <table
      style="
        position: fixed;
        top: 5px;
        left: 5px;
        z-index: 99;
        background-color: white;
      "
    >
      <tr>
        <th>Image</th>
        <th></th>
        <th style="visibility: hidden">-0.00 π</th>
        <th></th>
        <th>Text</th>
        <th></th>
        <th></th>
      </tr>
      <tr>
        <td><label for="rotateWithView">rotateWithView</label></td>
        <td>
          <input id="rotateWithView" type="checkbox" />
        </td>
        <td><span id="rotateWithViewOut"></span></td>
        <td></td>
        <td><label for="textRotateWithView">rotateWithView</label></td>
        <td>
          <input id="textRotateWithView" type="checkbox" />
        </td>
        <td><span id="textRotateWithViewOut"></span></td>
      </tr>
      <tr>
        <td><label for="rotation">rotation</label></td>
        <td>
          <input
            id="rotation"
            type="range"
            min="-1"
            max="1"
            step="0.05"
            value="0"
          />
        </td>
        <td><span id="rotationOut"></span> π</td>
        <td></td>
        <td><label for="textRotation">rotation</label></td>
        <td>
          <input
            id="textRotation"
            type="range"
            min="-1"
            max="1"
            step="0.05"
            value="0"
          />
        </td>
        <td><span id="textRotationOut"></span> π</td>
      </tr>
      <tr>
        <td><label for="scaleX">scaleX</label></td>
        <td>
          <input
            id="scaleX"
            type="range"
            min="-2"
            max="2"
            step="0.1"
            value="1"
          />
        </td>
        <td><span id="scaleXOut"></span></td>
        <td></td>
        <td><label for="textScaleX">scaleX</label></td>
        <td>
          <input
            id="textScaleX"
            type="range"
            min="-2"
            max="2"
            step="0.1"
            value="1"
          />
        </td>
        <td><span id="textScaleXOut"></span></td>
      </tr>
      <tr>
        <td><label for="scaleY">scaleY</label></td>
        <td>
          <input
            id="scaleY"
            type="range"
            min="-2"
            max="2"
            step="0.1"
            value="1"
          />
        </td>
        <td><span id="scaleYOut"></span></td>
        <td></td>
        <td><label for="textScaleY">scaleY</label></td>
        <td>
          <input
            id="textScaleY"
            type="range"
            min="-2"
            max="2"
            step="0.1"
            value="1"
          />
        </td>
        <td><span id="textScaleYOut"></span></td>
      </tr>
      <tr>
        <td><label for="anchorX">anchorX</label></td>
        <td>
          <input
            id="anchorX"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </td>
        <td><span id="anchorXOut"></span></td>
        <td></td>
        <td><label for="textAlign">textAlign</label></td>
        <td>
          <input
            id="textAlign"
            type="range"
            min="0"
            max="2"
            step="1"
            value="1"
          />
        </td>
        <td><span id="textAlignOut"></span></td>
      </tr>
      <tr>
        <td><label for="anchorY">anchorY</label></td>
        <td>
          <input
            id="anchorY"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </td>
        <td><span id="anchorYOut"></span></td>
        <td></td>
        <td><label for="textBaseline">textBaseline</label></td>
        <td>
          <input
            id="textBaseline"
            type="range"
            min="0"
            max="2"
            step="1"
            value="1"
          />
        </td>
        <td><span id="textBaselineOut"></span></td>
      </tr>
      <tr>
        <td><label for="displacementX">displacementX</label></td>
        <td>
          <input
            id="displacementX"
            type="range"
            min="-100"
            max="100"
            value="0"
          />
        </td>
        <td><span id="displacementXOut"></span></td>
        <td></td>
        <td><label for="textOffsetX">offsetX</label></td>
        <td>
          <input id="textOffsetX" type="range" min="-100" max="100" value="0" />
        </td>
        <td><span id="textOffsetXOut"></span></td>
      </tr>
      <tr>
        <td><label for="displacementY">displacementY</label></td>
        <td>
          <input
            id="displacementY"
            type="range"
            min="-100"
            max="100"
            value="0"
          />
        </td>
        <td><span id="displacementYOut"></span></td>
        <td></td>
        <td><label for="textOffsetY">offsetY</label></td>
        <td>
          <input id="textOffsetY" type="range" min="-100" max="100" value="0" />
        </td>
        <td><span id="textOffsetYOut"></span></td>
      </tr>
    </table>
    <script>
      const iconFeature = new ol.Feature({
        geometry: new ol.geom.Point([104, 30]),
      });

      const iconStyle = new ol.style.Style({
        image: new ol.style.Icon({
          src: "https://webgishome-pic.oss-cn-chengdu.aliyuncs.com/common/point/001_20_0_ylw-pushpin.png",
          crossOrigin: "anonymous",
        }),
        text: new ol.style.Text({
          text: "World\nText",
          font: "bold 30px Calibri,sans-serif",
          fill: new ol.style.Fill({
            color: "black",
          }),
          stroke: new ol.style.Stroke({
            color: "white",
            width: 2,
          }),
        }),
      });

      const pointStyle = new ol.style.Style({
        image: new ol.style.Circle({
          radius: 7,
          fill: new ol.style.Fill({
            color: "black",
          }),
          stroke: new ol.style.Stroke({
            color: "white",
            width: 2,
          }),
        }),
      });

      iconFeature.setStyle([pointStyle, iconStyle]);

      let source = new ol.source.Vector();
      source.addFeature(iconFeature);

      const vectorLayer = new ol.layer.Vector({
        source: source,
      });

      let map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            }),
          }),
        ],
        view: new ol.View({
          projection: "EPSG:4326",
          center: [108.522097, 37.272848],
          zoom: 4,
        }),
      });
      map.addLayer(vectorLayer);

      const textAlignments = ["left", "center", "right"];
      const textBaselines = ["top", "middle", "bottom"];
      const controls = {};
      const controlIds = [
        "rotation",
        "rotateWithView",
        "scaleX",
        "scaleY",
        "anchorX",
        "anchorY",
        "displacementX",
        "displacementY",
        "textRotation",
        "textRotateWithView",
        "textScaleX",
        "textScaleY",
        "textAlign",
        "textBaseline",
        "textOffsetX",
        "textOffsetY",
      ];
      controlIds.forEach(function (id) {
        const control = document.getElementById(id);
        const output = document.getElementById(id + "Out");
        function setOutput() {
          const value = parseFloat(control.value);
          if (control.type === "checkbox") {
            output.innerText = control.checked;
          } else if (id === "textAlign") {
            output.innerText = textAlignments[value];
          } else if (id === "textBaseline") {
            output.innerText = textBaselines[value];
          } else {
            output.innerText = control.step.startsWith("0.")
              ? value.toFixed(2)
              : value;
          }
        }
        control.addEventListener("input", function () {
          setOutput();
          updateStyle();
        });
        setOutput();
        controls[id] = control;
      });

      const updateStyle = () => {
        iconStyle
          .getImage()
          .setRotation(parseFloat(controls["rotation"].value) * Math.PI);

        iconStyle
          .getImage()
          .setRotateWithView(controls["rotateWithView"].checked);

        iconStyle
          .getImage()
          .setScale([
            parseFloat(controls["scaleX"].value),
            parseFloat(controls["scaleY"].value),
          ]);

        iconStyle
          .getImage()
          .setAnchor([
            parseFloat(controls["anchorX"].value),
            parseFloat(controls["anchorY"].value),
          ]);

        iconStyle
          .getImage()
          .setDisplacement([
            parseFloat(controls["displacementX"].value),
            parseFloat(controls["displacementY"].value),
          ]);

        iconStyle
          .getText()
          .setRotation(parseFloat(controls["textRotation"].value) * Math.PI);

        iconStyle
          .getText()
          .setRotateWithView(controls["textRotateWithView"].checked);

        iconStyle
          .getText()
          .setScale([
            parseFloat(controls["textScaleX"].value),
            parseFloat(controls["textScaleY"].value),
          ]);

        iconStyle
          .getText()
          .setTextAlign(
            textAlignments[parseFloat(controls["textAlign"].value)],
          );

        iconStyle
          .getText()
          .setTextBaseline(
            textBaselines[parseFloat(controls["textBaseline"].value)],
          );

        iconStyle
          .getText()
          .setOffsetX(parseFloat(controls["textOffsetX"].value));
        iconStyle
          .getText()
          .setOffsetY(parseFloat(controls["textOffsetY"].value));

        iconFeature.changed();
      };
      updateStyle();

      map.on("pointermove", function (e) {
        map.getTargetElement().style.cursor = map.hasFeatureAtPixel(e.pixel)
          ? "pointer"
          : "";
      });
    </script>
  </body>
</html>
