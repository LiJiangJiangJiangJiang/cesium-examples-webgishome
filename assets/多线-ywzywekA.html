<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    Cesium.Ion.defaultAccessToken =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

    let viewer = new Cesium.Viewer("map", {
      infoBox: false, // 信息框
      selectionIndicator: false, //选取指示器组件
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    let czml = [
      {
        id: "document",
        name: "CZML Geometries: Polyline",
        version: "1.0",
      },
      {
        id: "redLine",
        name: "Red line clamped to terain",
        polyline: {
          positions: {
            cartographicDegrees: [-75, 35, 0, -125, 35, 0],
          },
          material: {
            solidColor: {
              color: {
                rgba: [255, 0, 0, 255],
              },
            },
          },
          width: 5,
          clampToGround: true,
        },
      },
      {
        id: "blueLine",
        name: "Glowing blue line on the surface",
        polyline: {
          positions: {
            cartographicDegrees: [-75, 37, 0, -125, 37, 0],
          },
          material: {
            polylineGlow: {
              color: {
                rgba: [0, 0, 255, 255],
              },
              glowPower: 0.2,
            },
          },
          width: 10,
        },
      },
      {
        id: "orangeLine",
        name: "Orange line with black outline at height and following the surface",
        polyline: {
          positions: {
            cartographicDegrees: [-75, 39, 250000, -125, 39, 250000],
          },
          material: {
            polylineOutline: {
              color: {
                rgba: [255, 165, 0, 255],
              },
              outlineColor: {
                rgba: [0, 0, 0, 255],
              },
              outlineWidth: 2,
            },
          },
          width: 5,
        },
      },
      {
        id: "purpleLine",
        name: "Purple arrow at height",
        polyline: {
          positions: {
            cartographicDegrees: [-75, 43, 500000, -125, 43, 500000],
          },
          material: {
            polylineArrow: {
              color: {
                rgba: [148, 0, 211, 255],
              },
            },
          },
          followSurface: false,
          width: 10,
        },
      },
      {
        id: "dashedLine",
        name: "Blue dashed line",
        polyline: {
          positions: {
            cartographicDegrees: [-75, 45, 500000, -125, 45, 500000],
          },
          material: {
            polylineDash: {
              color: {
                rgba: [0, 255, 255, 255],
              },
            },
          },
          width: 4,
        },
      },
    ];
    let dataSourcePromise = Cesium.CzmlDataSource.load(czml);
    viewer.dataSources.add(dataSourcePromise);
    viewer.zoomTo(dataSourcePromise);
  </script>
</body>
