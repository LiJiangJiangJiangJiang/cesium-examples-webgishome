<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- 使用较新的 Cesium 版本 (1.117) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* 控制面板样式 */
      .control-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 8px;
        z-index: 1000;
        font-family: Arial, sans-serif;
      }

      .control-panel label {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 14px;
      }

      .control-panel input[type="checkbox"] {
        margin-right: 8px;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <!-- 控制面板 -->
    <div class="control-panel">
      <label>
        <input type="checkbox" id="nightVisionToggle" checked />
        夜视效果
      </label>
    </div>

    <script>
      // 初始化 Cesium
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      let nightVisionStage = null;
      let isNightVisionEnabled = true;

      // 创建夜视效果着色器
      const nightVisionFragmentShader = `
            #version 300 es
            precision highp float;
            
            uniform sampler2D colorTexture;
            in vec2 v_textureCoordinates;
            out vec4 fragColor;
            
            void main() {
                vec4 color = texture(colorTexture, v_textureCoordinates);
                
                // 转换为灰度
                float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
                
                // 应用绿色色调（夜视效果）
                vec3 nightVisionColor = vec3(0.0, gray * 1.2, 0.0);
                
                // 添加一些噪点效果增强真实感
                float noise = fract(sin(dot(v_textureCoordinates, vec2(12.9898, 78.233))) * 43758.5453);
                nightVisionColor += noise * 0.05;
                
                fragColor = vec4(nightVisionColor, color.a);
            }
        `;
      function enableNightVision(viewer) {
        if (nightVisionStage) return;

        nightVisionStage = new Cesium.PostProcessStage({
          name: "nightVision",
          fragmentShader: nightVisionFragmentShader,
          uniforms: {},
        });

        viewer.scene.postProcessStages.add(nightVisionStage);
      }

      function disableNightVision(viewer) {
        if (nightVisionStage) {
          viewer.scene.postProcessStages.remove(nightVisionStage);
          nightVisionStage = null;
        }
      }

      async function initScene() {
        // 创建地形提供者
        const terrainProvider = await Cesium.createWorldTerrainAsync();

        const viewer = new Cesium.Viewer("cesiumContainer", {
          animation: false,
          timeline: false,
          baseLayerPicker: false,
          infoBox: false,
          selectionIndicator: false,
          terrainProvider: terrainProvider,
        });

        // 设置相机初始位置
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(
            119.032698,
            33.591015,
            2000,
          ),
          orientation: {
            heading: Cesium.Math.toRadians(343),
            pitch: Cesium.Math.toRadians(-21),
            roll: 0.0,
          },
        });

        // 加载3D Tiles模型
        const tileset = await Cesium.Cesium3DTileset.fromUrl(
          "https://data.mars3d.cn/3dtiles/qx-simiao/tileset.json",
          {
            maximumScreenSpaceError: 1,
          },
        );

        viewer.scene.primitives.add(tileset);

        // 启用夜视效果
        enableNightVision(viewer);

        // 监听复选框变化
        document
          .getElementById("nightVisionToggle")
          .addEventListener("change", function (e) {
            if (e.target.checked) {
              enableNightVision(viewer);
            } else {
              disableNightVision(viewer);
            }
          });

        // 添加参考标记点
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(119.032698, 33.591015, 100),
          point: {
            pixelSize: 10,
            color: Cesium.Color.RED,
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 2,
          },
          label: {
            text: "夜视效果测试点",
            font: "14px sans-serif",
            fillColor: Cesium.Color.WHITE,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            outlineWidth: 2,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -15),
          },
        });

        return viewer;
      }

      // 初始化场景
      initScene().catch(function (error) {
        console.error("初始化场景失败:", error);
      });
    </script>
  </body>
</html>
