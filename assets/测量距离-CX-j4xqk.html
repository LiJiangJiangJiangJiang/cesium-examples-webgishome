<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    Cesium.Ion.defaultAccessToken =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

    let viewer = new Cesium.Viewer("map", {
      infoBox: false, // 信息框
      selectionIndicator: false, //选取指示器组件
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    let handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    // 取消双击事件-追踪该位置
    viewer.cesiumWidget.screenSpaceEventHandler.removeInputAction(
      Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK,
    );

    handler = new Cesium.ScreenSpaceEventHandler(
      viewer.scene._imageryLayerCollection,
    );
    document.getElementById("map").style.cursor = "crosshair";

    let positions = [];
    let poly = null;
    // let tooltip = document.getElementById("toolTip");
    let distance = 0;
    let cartesian = null;
    let floatingPoint;
    // tooltip.style.display = "block";

    handler.setInputAction((movement) => {
      // tooltip.style.left = movement.endPosition.x + 3 + "px";
      // tooltip.style.top = movement.endPosition.y - 25 + "px";
      // tooltip.innerHTML = "<p>单击开始，右击结束</p>";
      // cartesian = viewer.scene.pickPosition(movement.endPosition);
      // let ray = viewer.camera.getPickRay(movement.endPosition);
      // cartesian = viewer.scene.globe.pick(ray, viewer.scene);
      cartesian = viewer.scene.camera.pickEllipsoid(
        movement.endPosition,
        viewer.scene.globe.ellipsoid,
      );
      if (positions.length >= 2) {
        if (!Cesium.defined(poly)) {
          poly = new PolyLinePrimitive(positions);
        } else {
          positions.pop();
          // cartesian.y += (1 + Math.random());
          positions.push(cartesian);
        }
        distance = getSpaceDistance(positions);
        // console.log("distance: " + distance);
        // tooltip.innerHTML="<p>"+distance+"米</p>";
      }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    handler.setInputAction((movement) => {
      // tooltip.style.display = "none";
      cartesian = viewer.scene.camera.pickEllipsoid(
        movement.position,
        viewer.scene.globe.ellipsoid,
      );
      // cartesian = viewer.scene.pickPosition(movement.position);
      let ray = viewer.camera.getPickRay(movement.position);
      // cartesian = viewer.scene.globe.pick(ray, viewer.scene);
      if (positions.length == 0) {
        positions.push(cartesian.clone());
      }
      positions.push(cartesian);
      //在三维场景中添加Label
      //   let cartographic = Cesium.Cartographic.fromCartesian(cartesian);
      let textDisance = distance + "米";
      // console.log(textDisance + ",lng:" + cartographic.longitude/Math.PI*180.0);
      floatingPoint = viewer.entities.add({
        name: "空间直线距离",
        // position: Cesium.Cartesian3.fromDegrees(cartographic.longitude / Math.PI * 180, cartographic.latitude / Math.PI * 180,cartographic.height),
        position: positions[positions.length - 1],
        point: {
          color: Cesium.Color.WHITE,
          pixelSize: 3,
          outlineColor: Cesium.Color.RED,
          outlineWidth: 2,
        },
        label: {
          text: textDisance,
          font: "12px",
          fillColor: Cesium.Color.WHITE,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          outlineWidth: 1,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(20, -20),
        },
      });
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    handler.setInputAction((movement) => {
      handler.destroy(); //关闭事件句柄
      positions.pop(); //最后一个点无效
      // viewer.entities.remove(floatingPoint);
      // tooltip.style.display = "none";
      document.getElementById("map").style.cursor = "default";
    }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

    let PolyLinePrimitive = (function () {
      function _(positions) {
        this.options = {
          name: "直线",
          polyline: {
            show: true,
            positions: [],
            width: 2.0,
            material: Cesium.Color.ORANGE,
            clampToGround: true,
          },
        };
        this.positions = positions;
        this._init();
      }

      _.prototype._init = function () {
        let _self = this;
        let _update = function () {
          return _self.positions;
        };
        //实时更新polyline.positions
        this.options.polyline.positions = new Cesium.CallbackProperty(
          _update,
          false,
        );
        viewer.entities.add(this.options);
      };

      return _;
    })();

    //空间两点距离计算函数
    const getSpaceDistance = (positions) => {
      let distance = 0;
      for (let i = 0; i < positions.length - 1; i++) {
        let point1cartographic = Cesium.Cartographic.fromCartesian(
          positions[i],
        );
        let point2cartographic = Cesium.Cartographic.fromCartesian(
          positions[i + 1],
        );
        /**根据经纬度计算出距离**/
        let geodesic = new Cesium.EllipsoidGeodesic();
        geodesic.setEndPoints(point1cartographic, point2cartographic);
        let s = geodesic.surfaceDistance;
        //console.log(Math.sqrt(Math.pow(distance, 2) + Math.pow(endheight, 2)));
        //返回两点之间的距离
        // s = Math.sqrt(
        //   Math.pow(s, 2) +
        //     Math.pow(point2cartographic.height - point1cartographic.height, 2)
        // );
        distance = distance + s;
      }
      return distance.toFixed(2);
    };
  </script>
</body>
