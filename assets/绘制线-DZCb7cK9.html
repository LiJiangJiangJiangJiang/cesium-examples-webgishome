<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <button onclick="start()">开始绘制</button>
      <button onclick="cancel()">取消绘制</button>
      <button onclick="clearAll()">清空</button>
    </div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      let viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";
      viewer.scene.globe.depthTestAgainstTerrain = true; //务必开启，否则无论是否有地形，绘制点偏移都很大

      let handler = null;
      // 开始绘制
      const start = () => {
        handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

        let tempPoints = [];
        let mouseMovePosition = null; //移动点
        handler.setInputAction((e) => {
          //调用获取位置信息的接口
          let ray = viewer.camera.getPickRay(e.position);
          let position = viewer.scene.globe.pick(ray, viewer.scene);
          tempPoints.push(position);
          //调用绘制点的接口
          viewer.entities.add({
            name: "点几何对象",
            position: tempPoints[tempPoints.length - 1],
            point: {
              color: Cesium.Color.WHITE,
              pixelSize: 10,
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 1,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
              heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            },
          });
          viewer.entities.add({
            name: "线几何对象",
            polyline: {
              positions: new Cesium.CallbackProperty(() => {
                let c = Array.from(tempPoints);
                if (mouseMovePosition) {
                  c.push(mouseMovePosition);
                }
                return c;
              }, false),
              width: 1.0,
              material: new Cesium.Material({
                color: Cesium.Color.WHITE,
              }),
              depthFailMaterial: new Cesium.Material({
                color: Cesium.Color.WHITE,
              }),
              clampToGround: true,
            },
          });
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        handler.setInputAction((e) => {
          let p = viewer.scene.pickPosition(e.endPosition);
          if (!p) return;
          mouseMovePosition = p;
        }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

        handler.setInputAction((e) => {
          viewer.entities.add({
            polyline: {
              positions: tempPoints,
              clampToGround: true, //贴地
              width: 1,
              material: new Cesium.Material({
                color: Cesium.Color.WHITE,
              }),
              depthFailMaterial: new Cesium.Material({
                color: Cesium.Color.WHITE,
              }),
            },
          });
          tempPoints = [];
          cancel();
        }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

        document.getElementById("map").style.cursor = "crosshair";
      };

      // 取消绘制
      const cancel = () => {
        handler && handler.destroy();

        document.getElementById("map").style.cursor = "default";
      };

      // 清空
      const clearAll = () => {
        viewer.entities.removeAll();
        document.getElementById("map").style.cursor = "default";
      };
    </script>
  </body>
</html>
