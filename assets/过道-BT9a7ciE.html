<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      const redCorridor = viewer.entities.add({
        name: "Red corridor on surface with rounded corners",
        corridor: {
          positions: Cesium.Cartesian3.fromDegreesArray([
            -100.0, 40.0, -105.0, 40.0, -105.0, 35.0,
          ]),
          width: 200000.0,
          material: Cesium.Color.RED.withAlpha(0.5),
        },
      });

      const greenCorridor = viewer.entities.add({
        name: "Green corridor at height with mitered corners and outline",
        corridor: {
          positions: Cesium.Cartesian3.fromDegreesArray([
            -90.0, 40.0, -95.0, 40.0, -95.0, 35.0,
          ]),
          height: 100000.0,
          width: 200000.0,
          cornerType: Cesium.CornerType.MITERED,
          material: Cesium.Color.GREEN,
          outline: true, // height required for outlines to display
        },
      });

      const blueCorridor = viewer.entities.add({
        name: "Blue extruded corridor with beveled corners and outline",
        corridor: {
          positions: Cesium.Cartesian3.fromDegreesArray([
            -80.0, 40.0, -85.0, 40.0, -85.0, 35.0,
          ]),
          height: 200000.0,
          extrudedHeight: 100000.0,
          width: 200000.0,
          cornerType: Cesium.CornerType.BEVELED,
          material: Cesium.Color.BLUE.withAlpha(0.5),
          outline: true, // height or extrudedHeight must be set for outlines to display
          outlineColor: Cesium.Color.WHITE,
        },
      });

      viewer.zoomTo(viewer.entities);
    </script>
  </body>
</html>
