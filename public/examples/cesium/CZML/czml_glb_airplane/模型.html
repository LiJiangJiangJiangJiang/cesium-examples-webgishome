<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    let viewer = new Cesium.Viewer("map", {
      infoBox: false, // 信息框
      selectionIndicator: false, //选取指示器组件
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      shadows: true,
      shouldAnimate: true, //模型显示动画
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
      }),
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    const czml = [
      {
        id: "document",
        name: "CZML Model",
        version: "1.0",
      },
      {
        id: "aircraft model",
        name: "Cesium Air",
        position: {
          cartographicDegrees: [104.13699186126235, 30.320240186854843, 0], // 生成位置
        },
        model: {
          gltf: "https://webgishome-file.oss-cn-chengdu.aliyuncs.com/common/Cesium_Air.glb", // 文件路径
          scale: 2.0,
          minimumPixelSize: 128,
        },
      },
    ];
    const dataSourcePromise = viewer.dataSources.add(
      Cesium.CzmlDataSource.load(czml),
    );
    viewer.dataSources.add(dataSourcePromise);
    viewer.zoomTo(dataSourcePromise);
    dataSourcePromise
      .then((dataSource) => {
        viewer.trackedEntity = dataSource.entities.getById("aircraft model");
      })
      .catch((error) => {
        window.alert(error);
      });
  </script>
</body>
