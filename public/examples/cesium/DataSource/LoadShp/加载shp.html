<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- 使用较新的 Cesium 版本 (1.117) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <!-- 引入 shapefile-js 库 -->
    <script src="https://unpkg.com/shapefile@0.6.6/dist/shapefile.js"></script>
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #fileInput {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        color: white;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <input type="file" id="fileInput" accept=".shp,.dbf" multiple />
    <script>
      // 初始化 Cesium。
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        infoBox: false,
        selectionIndicator: false,
      });

      // 监听文件输入
      document
        .getElementById("fileInput")
        .addEventListener("change", function (event) {
          const files = event.target.files;
          let shpFile, dbfFile;

          // 分离 .shp 和 .dbf 文件
          for (let file of files) {
            if (file.name.endsWith(".shp")) {
              shpFile = file;
            } else if (file.name.endsWith(".dbf")) {
              dbfFile = file;
            }
          }

          if (!shpFile) {
            alert("请选择 .shp 文件");
            return;
          }

          // 先移除之前可能加载的数据
          viewer.dataSources.removeAll();

          // 解析 SHP 文件
          const reader = new FileReader();
          reader.onload = function (e) {
            const arrayBuffer = e.target.result;
            // 使用 shapefile 库解析
            shapefile
              .read(arrayBuffer, dbfFile ? dbfFile : null)
              .then(function (geojson) {
                // 将 GeoJSON 加载到 Cesium
                viewer.dataSources
                  .add(
                    Cesium.GeoJsonDataSource.load(geojson, {
                      stroke: Cesium.Color.HOTPINK,
                      fill: Cesium.Color.PINK.withAlpha(0.5),
                      strokeWidth: 3,
                    }),
                  )
                  .then(function (dataSource) {
                    // 加载完成后，飞到此数据的位置
                    if (dataSource.entities.values.length > 0) {
                      viewer.flyTo(dataSource.entities);
                    }
                  })
                  .catch(function (error) {
                    console.error("加载 GeoJSON 到 Cesium 失败:", error);
                    alert("加载到 Cesium 失败");
                  });
              })
              .catch(function (error) {
                console.error("解析 SHP 文件失败:", error);
                alert("加载 SHP 文件失败，请检查文件格式。");
              });
          };
          reader.readAsArrayBuffer(shpFile);
        });
    </script>
  </body>
</html>
