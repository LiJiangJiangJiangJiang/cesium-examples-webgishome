<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      let res = Cesium.GeoJsonDataSource.load(
        "https://file.webgishome.com/common/vectorSource/geojson/sichuan/sichuan.json",
        {
          stroke: Cesium.Color.WHITE,
          fill: Cesium.Color.BLUE.withAlpha(0.3), //注意：颜色必须大写，即不能为blue
          strokeWidth: 5,
        },
      );
      console.log("res", res);
      viewer.dataSources.add(res);

      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(
          103.07,
          30.66,
          2187060.5526515525,
        ),
        orientation: {
          heading: 6.283185, //相机绕z轴旋转。左右摇头。
          pitch: -1.569114, //相机绕y轴旋转。上下点头。
          roll: 0.0, //相机绕x轴旋转。左右歪头。
        },
      });

      let handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction((e) => {
        console.log("e:", e);
        console.log("屏幕坐标:", e.position);

        let pick = viewer.scene.pick(e.position);
        console.log("当前实体:", pick);
        if (Cesium.defined(pick)) {
          console.log("实体属性：", pick.id.properties.getValue());
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      handler.setInputAction((e) => {
        let pick = viewer.scene.pick(e.endPosition);
        if (Cesium.defined(pick)) {
          viewer._container.style.cursor = "pointer";
        } else {
          viewer._container.style.cursor = "";
        }
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
    </script>
  </body>
</html>
