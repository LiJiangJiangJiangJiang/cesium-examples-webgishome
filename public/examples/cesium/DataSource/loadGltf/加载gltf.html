<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- 使用较新的 Cesium 版本 (1.117) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>

    <script>
      // 初始化 Cesium。
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        infoBox: false,
        selectionIndicator: false,
      });

      // 设置初始视角到成都附近
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(104.06, 30.67, 5000), // 成都经纬度，高度5000米
        orientation: {
          heading: 0,
          pitch: -Math.PI / 10,
          roll: 0,
        },
      });

      // 创建 glTF 模型实体
      const modelEntity = viewer.entities.add({
        name: "Car Model",
        position: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 50), // 略偏移一点避免遮挡中心点
        orientation: Cesium.Transforms.headingPitchRollQuaternion(
          Cesium.Cartesian3.fromDegrees(104.05, 30.65, 45),
          new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(90), 0, 0),
        ),
        model: {
          uri: "//data.mars3d.cn/gltf/mars/qiche.gltf",
          scale: 20.0, // 根据模型大小调整缩放
          minimumPixelSize: 64, // 确保模型在远处也可见
          maximumScale: 200, // 限制最大缩放
          runAnimations: true, // 如果有动画则运行
        },
      });

      // 将相机飞向模型位置
      setTimeout(() => {
        viewer.flyTo(modelEntity);
      }, 1500);
    </script>
  </body>
</html>
