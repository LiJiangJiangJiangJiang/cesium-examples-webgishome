<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #echartsOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <div id="echartsOverlay"></div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        infoBox: false,
        selectionIndicator: false,
      });

      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(
          118.789746,
          28.348014,
          840941,
        ),
        orientation: {
          heading: Cesium.Math.toRadians(350),
          pitch: Cesium.Math.toRadians(-66),
          roll: 0,
        },
      });

      const data = [
        { name: "六安市", value: 112, location: [116.3123, 31.8329] },
        { name: "安庆市", value: 424, location: [116.7517, 30.5255] },
        { name: "滁州市", value: 76, location: [118.1909, 32.536] },
        { name: "宣城市", value: 45, location: [118.8062, 30.6244] },
        { name: "阜阳市", value: 234, location: [115.7629, 32.9919] },
        { name: "宿州市", value: 110, location: [117.5208, 33.6841] },
        { name: "黄山市", value: 98, location: [118.0481, 29.9542] },
        { name: "巢湖市", value: 71, location: [117.7734, 31.4978] },
        { name: "亳州市", value: 165, location: [116.1914, 33.4698] },
        { name: "池州市", value: 12, location: [117.3889, 30.2014] },
        { name: "合肥市", value: 232, location: [117.29, 32.0581] },
        { name: "蚌埠市", value: 123, location: [117.4109, 33.1073] },
        { name: "芜湖市", value: 73, location: [118.3557, 31.0858] },
        { name: "淮北市", value: 16, location: [116.6968, 33.6896] },
        { name: "淮南市", value: 75, location: [116.7847, 32.7722] },
        { name: "马鞍山市", value: 45, location: [118.6304, 31.5363] },
        { name: "铜陵市", value: 93, location: [117.9382, 30.9375] },
      ];

      const sum = data.reduce((acc, item) => acc + item.value, 0);

      let echartsChart = null;

      function initEcharts() {
        const overlay = document.getElementById("echartsOverlay");
        echartsChart = echarts.init(overlay);

        const seriesData = data.map((item) => ({
          name: item.name,
          value: [...item.location, item.value],
        }));

        const option = {
          animation: false,
          backgroundColor: "transparent",
          tooltip: {
            trigger: "item",
            formatter: function (params) {
              if (params.value[2] <= 0) {
                return params.name;
              } else {
                return params.name + " ： " + params.value[2];
              }
            },
          },
          series: [
            {
              type: "effectScatter",
              coordinateSystem: "geo",
              data: seriesData,
              symbolSize: function (val) {
                if (sum === 0) {
                  return 8;
                }
                var num = (val[2] / sum) * 150;
                return Math.max(num, 8);
              },
              showEffectOn: "render",
              rippleEffect: {
                brushType: "stroke",
              },
              hoverAnimation: true,
              label: {
                normal: {
                  formatter: "{b}",
                  position: "right",
                  show: true,
                  color: "#fff",
                  fontSize: 12,
                },
              },
              itemStyle: {
                normal: {
                  color: "#ffff00",
                  shadowBlur: 60,
                  shadowColor: "#cccccc",
                },
              },
              zlevel: 1,
            },
          ],
        };

        echartsChart.setOption(option);
      }

      function updateEchartsPosition() {
        if (!echartsChart) return;

        const canvas = viewer.canvas;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;

        echartsChart.resize({ width, height });

        const geoCoordMap = {};
        data.forEach((item) => {
          const cartographic = Cesium.Cartographic.fromDegrees(
            item.location[0],
            item.location[1],
          );
          const cartesian = Cesium.SceneTransforms.wgs84ToWindowCoordinates(
            viewer.scene,
            Cesium.Cartesian3.fromRadians(
              cartographic.longitude,
              cartographic.latitude,
              0,
            ),
          );

          if (cartesian) {
            geoCoordMap[item.name] = [cartesian.x, cartesian.y];
          }
        });

        const seriesData = data
          .map((item) => {
            const screenPos = geoCoordMap[item.name];
            if (screenPos) {
              return {
                name: item.name,
                value: [...screenPos, item.value],
              };
            }
            return null;
          })
          .filter((item) => item !== null);

        const option = {
          animation: false,
          backgroundColor: "transparent",
          tooltip: {
            trigger: "item",
            formatter: function (params) {
              if (params.value[2] <= 0) {
                return params.name;
              } else {
                return params.name + " ： " + params.value[2];
              }
            },
          },
          series: [
            {
              type: "effectScatter",
              coordinateSystem: "cartesian2d",
              xAxisIndex: 0,
              yAxisIndex: 0,
              data: seriesData,
              symbolSize: function (val) {
                if (sum === 0) {
                  return 8;
                }
                var num = (val[2] / sum) * 150;
                return Math.max(num, 8);
              },
              showEffectOn: "render",
              rippleEffect: {
                brushType: "stroke",
              },
              hoverAnimation: true,
              label: {
                normal: {
                  formatter: "{b}",
                  position: "right",
                  show: true,
                  color: "#fff",
                  fontSize: 12,
                },
              },
              itemStyle: {
                normal: {
                  color: "#ffff00",
                  shadowBlur: 60,
                  shadowColor: "#cccccc",
                },
              },
              zlevel: 1,
            },
          ],
          grid: {
            left: 0,
            right: 0,
            top: 0,
            bottom: 0,
          },
          xAxis: {
            type: "value",
            min: 0,
            max: width,
            show: false,
          },
          yAxis: {
            type: "value",
            min: 0,
            max: height,
            show: false,
            inverse: true,
          },
        };

        echartsChart.setOption(option);
      }

      initEcharts();
      updateEchartsPosition();

      viewer.camera.changed.addEventListener(updateEchartsPosition);
      viewer.scene.postRender.addEventListener(updateEchartsPosition);

      window.addEventListener("resize", () => {
        if (echartsChart) {
          updateEchartsPosition();
        }
      });
    </script>
  </body>
</html>
