<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      const greenPoint = viewer.entities.add({
        name: "Green point",
        position: Cesium.Cartesian3.fromDegrees(-114.0, 40.0),
        point: {
          color: Cesium.Color.GREEN,
          pixelSize: 20,
        },
      });

      const redPoint = viewer.entities.add({
        name: "Red point with YELLOW outline",
        position: Cesium.Cartesian3.fromDegrees(-107.0, 40.0, 300000.0),
        point: {
          color: Cesium.Color.RED.withAlpha(0.5),
          outlineColor: Cesium.Color.YELLOW,
          outlineWidth: 3,
          pixelSize: 20,
          show: true,
          disableDepthTestDistance: Number.POSITIVE_INFINITY, // 被遮挡也可见。默认被遮挡不可见
        },
      });

      const bluePoint = viewer.entities.add({
        name: "bluePoint",
        position: Cesium.Cartesian3.fromDegrees(-100.0, 40.0, 1000000.0),
        point: {
          color: Cesium.Color.BLUE.withAlpha(0.5),
          pixelSize: 50,
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(
            5000000,
            10000000,
          ), //视点距离在此范围内点才可见
        },
      });
    </script>
  </body>
</html>
