<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/cesium/v1.105.1/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/cesium/v1.105.1/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      const redRectangle = viewer.entities.add({
        name: "Red translucent rectangle",
        rectangle: {
          coordinates: Cesium.Rectangle.fromDegrees(-110.0, 20.0, -80.0, 25.0),
          material: Cesium.Color.RED.withAlpha(0.5),
        },
      });

      const greenRectangle = viewer.entities.add({
        name: "Green translucent, rotated, and extruded rectangle at height with outline",
        rectangle: {
          coordinates: Cesium.Rectangle.fromDegrees(-110.0, 30.0, -100.0, 40.0),
          material: Cesium.Color.GREEN.withAlpha(0.5),
          rotation: Cesium.Math.toRadians(45),
          extrudedHeight: 300000.0,
          height: 100000.0,
          outline: true, // height must be set for outline to display
          outlineColor: Cesium.Color.BLACK,
        },
      });

      let rotation = Cesium.Math.toRadians(30);

      function getRotationValue() {
        rotation += 0.005;
        return rotation;
      }
      viewer.entities.add({
        name: "Rotating rectangle with rotating texture coordinate",
        rectangle: {
          coordinates: Cesium.Rectangle.fromDegrees(-92.0, 30.0, -76.0, 40.0),
          material:
            "http://pic.webgishome.com/lj3d/Cesium_Logo_Color_Overlay.png",
          rotation: new Cesium.CallbackProperty(getRotationValue, false),
          stRotation: new Cesium.CallbackProperty(getRotationValue, false),
          classificationType: Cesium.ClassificationType.TERRAIN,
        },
      });

      viewer.zoomTo(viewer.entities);
    </script>
  </body>
</html>
