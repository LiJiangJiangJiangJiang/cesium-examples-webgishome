<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS之家</title>

    <link
      href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";
      const redWall = viewer.entities.add({
        name: "Red wall at height",
        wall: {
          positions: Cesium.Cartesian3.fromDegreesArrayHeights([
            -115.0, 44.0, 200000.0, -90.0, 44.0, 200000.0,
          ]),
          minimumHeights: [100000.0, 100000.0],
          material: Cesium.Color.RED,
        },
      });

      const greenWall = viewer.entities.add({
        name: "Green wall from surface with outline",
        wall: {
          positions: Cesium.Cartesian3.fromDegreesArrayHeights([
            -107.0, 43.0, 100000.0, -97.0, 43.0, 100000.0, -97.0, 40.0,
            100000.0, -107.0, 40.0, 100000.0, -107.0, 43.0, 100000.0,
          ]),
          material: Cesium.Color.GREEN,
          outline: true,
        },
      });

      const blueWall = viewer.entities.add({
        name: "Blue wall with sawtooth heights and outline",
        wall: {
          positions: Cesium.Cartesian3.fromDegreesArray([
            -115.0, 50.0, -112.5, 50.0, -110.0, 50.0, -107.5, 50.0, -105.0,
            50.0, -102.5, 50.0, -100.0, 50.0, -97.5, 50.0, -95.0, 50.0, -92.5,
            50.0, -90.0, 50.0,
          ]),
          maximumHeights: [
            100000, 200000, 100000, 200000, 100000, 200000, 100000, 200000,
            100000, 200000, 100000,
          ],
          minimumHeights: [
            0, 100000, 0, 100000, 0, 100000, 0, 100000, 0, 100000, 0,
          ],
          material: Cesium.Color.BLUE.withAlpha(0.5),
          outline: true,
          outlineColor: Cesium.Color.BLACK,
        },
      });

      viewer.zoomTo(viewer.entities);
    </script>
  </body>
</html>
