<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <button onclick="start()">开始绘制</button>
      <button onclick="cancel()">取消绘制</button>
      <button onclick="clearAll()">清空</button>
    </div>

    <script>
      let viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";
      viewer.scene.globe.depthTestAgainstTerrain = false; //务必关闭，否则绘制点在地图中是半圆

      let dataSource = new Cesium.CustomDataSource("my_dataSource");
      viewer.dataSources.add(dataSource);

      let handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

      // 开始绘制
      const start = () => {
        handler.setInputAction((e) => {
          console.log("e:", e);

          let ray = viewer.camera.getPickRay(e.position);
          // 查找射线与渲染的地球表面之间的交点。射线必须以世界坐标给出。返回Cartesian3对象
          let position = viewer.scene.globe.pick(ray, viewer.scene);

          dataSource.entities.add({
            position: position,
            point: {
              color: Cesium.Color.WHITE,
              pixelSize: 10,
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 1,
            },
          });
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        document.getElementById("map").style.cursor = "crosshair";
      };

      // 取消绘制
      const cancel = () => {
        handler.removeInputAction(Cesium.ScreenSpaceEventType.LEFT_CLICK);
        document.getElementById("map").style.cursor = "default";
      };

      // 清空
      const clearAll = () => {
        dataSource.entities.removeAll();
        document.getElementById("map").style.cursor = "default";
      };
    </script>
  </body>
</html>
