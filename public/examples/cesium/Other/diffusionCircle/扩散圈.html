<!doctype html>

<head>
  <title>WebGIS之家</title>

  <link
    href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    let viewer = new Cesium.Viewer("map", {
      infoBox: false,
      selectionIndicator: false,
      navigation: false,
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      shadows: true,
      shouldAnimate: true, //模型显示动画
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
      }),
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    let minR1 = 4000,
      minR2 = 4000; // 最小半径
    let maxR1 = 600000,
      maxR2 = 600000; // 最大半径
    let deviationR1 = 4000,
      deviationR2 = 4000; // 每次增加的半径
    const changeR1 = () => {
      minR1 += deviationR1;
      if (minR1 >= maxR1) {
        minR1 = 4000;
      }
      return minR1;
    };
    const changeR2 = () => {
      minR2 += deviationR2;
      if (minR2 >= maxR2) {
        minR2 = 4000;
      }
      return minR2;
    };
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(104, 31),
      ellipse: {
        semiMinorAxis: new Cesium.CallbackProperty(changeR1, false),
        semiMajorAxis: new Cesium.CallbackProperty(changeR2, false),
        outline: true,
        outlineColor: new Cesium.CallbackProperty(() => {
          let x = 1 - minR1 / maxR1;
          return Cesium.Color.RED.withAlpha(x);
        }, false),
        material: new Cesium.ImageMaterialProperty({
          image:
            "https://webgishome-pic.oss-cn-chengdu.aliyuncs.com/common/redCircle.png",
          repeat: new Cesium.Cartesian2(1.0, 1.0),
          transparent: true,
          color: new Cesium.CallbackProperty(function () {
            var alp = 1;
            alp = 1 - minR1 / maxR1;
            return Cesium.Color.WHITESMOKE.withAlpha(alp);
          }, false),
        }),
      },
    });
    viewer.zoomTo(viewer.entities);
  </script>
</body>
