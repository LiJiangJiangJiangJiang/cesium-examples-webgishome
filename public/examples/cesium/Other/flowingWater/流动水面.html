<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    let viewer = new Cesium.Viewer("map", {
      infoBox: false, // 信息框
      selectionIndicator: false, //选取指示器组件
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
      }),
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";
    viewer.scene.primitives.add(
      new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
          geometry: new Cesium.RectangleGeometry({
            rectangle: Cesium.Rectangle.fromDegrees(100, 30, 101, 31),
            vertexFormat: Cesium.EllipsoidSurfaceAppearance.VERTEX_FORMAT,
            height: 0, // 底面高度
          }),
        }),
        appearance: new Cesium.EllipsoidSurfaceAppearance({
          material: new Cesium.Material({
            fabric: {
              type: "Water",
              uniforms: {
                baseWaterColor: new Cesium.Color(
                  64 / 255.0,
                  157 / 255.0,
                  253 / 255.0,
                  0.6,
                ),
                normalMap:
                  "https://webgishome-pic.oss-cn-chengdu.aliyuncs.com/cesium/waterMaterial.jpg",
                frequency: 1000.0, // 水波纹数量
                animationSpeed: 0.1, // 水流速
                amplitude: 10, // 水波纹振动幅度
                specularIntensity: 8, // 镜面反射强度
              },
            },
          }),
        }),
      }),
    );

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(100.5, 30.5, 150000),
      orientation: {
        heading: 6.283185, //相机绕z轴旋转。左右摇头。
        pitch: 30, //相机绕y轴旋转。上下点头。
        roll: 0.0, //相机绕x轴旋转。左右歪头。
      },
    });
  </script>
</body>
