<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS之家</title>

    <link
      href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <div>
        <button onclick="flyToChengdu()">flyToChengdu</button>
        <button onclick="flyToHeadingPitchRoll()">flyToHeadingPitchRoll</button>
        <button onclick="flyToRectangle()">flyToRectangle</button>
      </div>
      <div>
        <button onclick="setViewChengdu()">setViewChengdu</button>
        <button onclick="setViewHeadingPitchRoll()">
          setViewHeadingPitchRoll
        </button>
        <button onclick="setViewRectangle()">setViewRectangle</button>
      </div>
      <div>
        <button onclick="lookAtChengdu()">lookAtChengdu</button>
      </div>
    </div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,

        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      // 飞到成都
      function flyToChengdu() {
        viewer.camera.flyTo({
          //注意：Cesium.Cartesian3.fromDegrees(经度，纬度，高度)。经纬度坐标转笛卡尔坐标xyz
          //俯视成都
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          complete: function () {
            console.log("飞行结束");
          },
          cancel: function () {
            console.log("取消飞行");
          },
        });
      }

      // 包含视角
      function flyToHeadingPitchRoll() {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          orientation: {
            heading: Cesium.Math.toRadians(0.0), //相机绕z轴旋转。左右摇头。默认为0
            pitch: Cesium.Math.toRadians(0.0), //相机绕y轴旋转。上下点头。默认为俯视-90
            roll: 0.0, //相机绕x轴旋转。左右歪头。默认为0
          },
          easingFunction: Cesium.EasingFunction.LINEAR_NONE,
          duration: 1, //秒
        });
      }

      //飞到指定矩形范围
      function flyToRectangle() {
        const west = -90.0;
        const south = 38.0;
        const east = -87.0;
        const north = 40.0;

        viewer.camera.flyTo({
          destination: Cesium.Rectangle.fromDegrees(west, south, east, north),
        });

        // 显示矩形框
        viewer.entities.add({
          rectangle: {
            coordinates: Cesium.Rectangle.fromDegrees(west, south, east, north),
            fill: false,
            outline: true,
            outlineColor: Cesium.Color.WHITE,
          },
        });
      }

      // 直接设置视角。无飞行动画
      function setViewChengdu() {
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
        });
      }
      function setViewHeadingPitchRoll() {
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          orientation: {
            heading: Cesium.Math.toRadians(0.0), //相机绕z轴旋转。左右摇头。默认为0
            pitch: Cesium.Math.toRadians(0.0), //相机绕y轴旋转。上下点头。默认为俯视-90
            roll: 0.0, //相机绕x轴旋转。左右歪头。默认为0
          },
        });
      }
      function setViewRectangle() {
        const west = -90.0;
        const south = 38.0;
        const east = -87.0;
        const north = 40.0;

        viewer.camera.setView({
          destination: Cesium.Rectangle.fromDegrees(west, south, east, north),
        });

        // 显示矩形框
        viewer.entities.add({
          rectangle: {
            coordinates: Cesium.Rectangle.fromDegrees(west, south, east, north),
            fill: false,
            outline: true,
            outlineColor: Cesium.Color.WHITE,
          },
        });
      }

      function lookAtChengdu() {
        var center = Cesium.Cartesian3.fromDegrees(
          104.06336859462759,
          30.659853155059775,
        );
        var heading = Cesium.Math.toRadians(50.0);
        var pitch = Cesium.Math.toRadians(-20.0);
        var range = 5000.0;
        viewer.camera.lookAt(
          center,
          new Cesium.HeadingPitchRange(heading, pitch, range),
        );
      }
    </script>
  </body>
</html>
