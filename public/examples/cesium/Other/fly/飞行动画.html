<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/cesium/v1.105.1/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/cesium/v1.105.1/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <div>
        <button onclick="flyToChengdu()">flyToChengdu</button>
        <button onclick="flyToHeadingPitchRoll()">flyToHeadingPitchRoll</button>
        <button onclick="flyToRectangle()">flyToRectangle</button>
      </div>
      <div>
        <button onclick="setViewChengdu()">setViewChengdu</button>
        <button onclick="setViewHeadingPitchRoll()">
          setViewHeadingPitchRoll
        </button>
        <button onclick="setViewRectangle()">setViewRectangle</button>
      </div>
      <div>
        <button onclick="lookAtChengdu()">lookAtChengdu</button>
      </div>
    </div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,

        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      // йЈһеҲ°жҲҗйғҪ
      function flyToChengdu() {
        viewer.camera.flyTo({
          //жіЁж„ҸпјҡCesium.Cartesian3.fromDegrees(з»ҸеәҰпјҢзә¬еәҰпјҢй«ҳеәҰ)гҖӮз»Ҹзә¬еәҰеқҗж ҮиҪ¬з¬ӣеҚЎе°”еқҗж Үxyz
          //дҝҜи§ҶжҲҗйғҪ
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          complete: function () {
            console.log("йЈһиЎҢз»“жқҹ");
          },
          cancel: function () {
            console.log("еҸ–ж¶ҲйЈһиЎҢ");
          },
        });
      }

      // еҢ…еҗ«и§Ҷи§’
      function flyToHeadingPitchRoll() {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          orientation: {
            heading: Cesium.Math.toRadians(0.0), //зӣёжңәз»•zиҪҙж—ӢиҪ¬гҖӮе·ҰеҸіж‘ҮеӨҙгҖӮй»ҳи®Өдёә0
            pitch: Cesium.Math.toRadians(0.0), //зӣёжңәз»•yиҪҙж—ӢиҪ¬гҖӮдёҠдёӢзӮ№еӨҙгҖӮй»ҳи®ӨдёәдҝҜи§Ҷ-90
            roll: 0.0, //зӣёжңәз»•xиҪҙж—ӢиҪ¬гҖӮе·ҰеҸіжӯӘеӨҙгҖӮй»ҳи®Өдёә0
          },
          easingFunction: Cesium.EasingFunction.LINEAR_NONE,
          duration: 1, //з§’
        });
      }

      //йЈһеҲ°жҢҮе®ҡзҹ©еҪўиҢғеӣҙ
      function flyToRectangle() {
        const west = -90.0;
        const south = 38.0;
        const east = -87.0;
        const north = 40.0;

        viewer.camera.flyTo({
          destination: Cesium.Rectangle.fromDegrees(west, south, east, north),
        });

        // жҳҫзӨәзҹ©еҪўжЎҶ
        viewer.entities.add({
          rectangle: {
            coordinates: Cesium.Rectangle.fromDegrees(west, south, east, north),
            fill: false,
            outline: true,
            outlineColor: Cesium.Color.WHITE,
          },
        });
      }

      // зӣҙжҺҘи®ҫзҪ®и§Ҷи§’гҖӮж— йЈһиЎҢеҠЁз”»
      function setViewChengdu() {
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
        });
      }
      function setViewHeadingPitchRoll() {
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(104.07, 30.66, 15000.0),
          orientation: {
            heading: Cesium.Math.toRadians(0.0), //зӣёжңәз»•zиҪҙж—ӢиҪ¬гҖӮе·ҰеҸіж‘ҮеӨҙгҖӮй»ҳи®Өдёә0
            pitch: Cesium.Math.toRadians(0.0), //зӣёжңәз»•yиҪҙж—ӢиҪ¬гҖӮдёҠдёӢзӮ№еӨҙгҖӮй»ҳи®ӨдёәдҝҜи§Ҷ-90
            roll: 0.0, //зӣёжңәз»•xиҪҙж—ӢиҪ¬гҖӮе·ҰеҸіжӯӘеӨҙгҖӮй»ҳи®Өдёә0
          },
        });
      }
      function setViewRectangle() {
        const west = -90.0;
        const south = 38.0;
        const east = -87.0;
        const north = 40.0;

        viewer.camera.setView({
          destination: Cesium.Rectangle.fromDegrees(west, south, east, north),
        });

        // жҳҫзӨәзҹ©еҪўжЎҶ
        viewer.entities.add({
          rectangle: {
            coordinates: Cesium.Rectangle.fromDegrees(west, south, east, north),
            fill: false,
            outline: true,
            outlineColor: Cesium.Color.WHITE,
          },
        });
      }

      function lookAtChengdu() {
        var center = Cesium.Cartesian3.fromDegrees(
          104.06336859462759,
          30.659853155059775,
        );
        var heading = Cesium.Math.toRadians(50.0);
        var pitch = Cesium.Math.toRadians(-20.0);
        var range = 5000.0;
        viewer.camera.lookAt(
          center,
          new Cesium.HeadingPitchRange(heading, pitch, range),
        );
      }
    </script>
  </body>
</html>
