<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WebGIS Home</title>

    <link
      href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
      rel="stylesheet"
    />
    <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      const viewer = new Cesium.Viewer("map", {
        infoBox: false,
        selectionIndicator: false,
        navigation: false,
        animation: false,
        shouldAnimate: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
          url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
        }),
      });
      viewer._cesiumWidget._creditContainer.style.display = "none";

      viewer.entities.add({
        name: "测试点",
        position: Cesium.Cartesian3.fromDegrees(-75.0, 50.0), //经纬度转世界坐标
        point: {
          show: true,
          color: Cesium.Color.GREEN,
          pixelSize: 20,
          outlineColor: Cesium.Color.YELLOW,
          outlineWidth: 3,
        },
      });
      var handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

      var labelEntity = viewer.entities.add({
        label: {
          show: false,
          showBackground: true,
          font: "14px monospace",
          horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
          verticalOrigin: Cesium.VerticalOrigin.TOP,
          pixelOffset: new Cesium.Cartesian2(15, 0),
        },
      });
      // 鼠标移入labelEntity提示框
      handler.setInputAction((e) => {
        var foundPosition = false;

        var pickedObject = viewer.scene.pick(e.endPosition);
        if (
          viewer.scene.pickPositionSupported &&
          Cesium.defined(pickedObject) &&
          pickedObject.id !== ""
        ) {
          var cartesian = viewer.scene.pickPosition(e.endPosition);

          if (Cesium.defined(cartesian)) {
            var cartographic = Cesium.Cartographic.fromCartesian(cartesian);
            labelEntity.position = cartesian;
            labelEntity.label.show = true;
            labelEntity.label.text = "名称: " + pickedObject.id._name;

            labelEntity.label.eyeOffset = new Cesium.Cartesian3(
              0.0,
              0.0,
              -cartographic.height *
                (viewer.scene.mode === Cesium.SceneMode.SCENE2D ? 1.5 : 1.0),
            );

            foundPosition = true;
          }
        }

        if (!foundPosition) {
          labelEntity.label.show = false;
        }
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
    </script>
  </body>
</html>
