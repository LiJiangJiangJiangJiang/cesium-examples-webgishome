<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Cesium Rotate Control</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />

    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #controlPanel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 999;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>

    <div id="controlPanel">
      <button id="startBtn">开始</button>
      <button id="stopBtn">停止</button>
    </div>

    <script>
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      (async () => {
        const viewer = new Cesium.Viewer("cesiumContainer", {
          animation: false,
          timeline: false,
          baseLayerPicker: false,
          infoBox: false,
          selectionIndicator: false,
          terrainProvider: await Cesium.createWorldTerrainAsync(),
        });

        const centerPoint = Cesium.Cartesian3.fromDegrees(
          116.350493,
          30.851782,
          0,
        );

        const distance = 7944;
        let heading = Cesium.Math.toRadians(348);
        const pitch = Cesium.Math.toRadians(-31);

        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(
            116.350493,
            30.851782,
            distance,
          ),
          orientation: {
            heading,
            pitch,
            roll: 0,
          },
        });

        let isRunning = true;

        const periodSeconds = 4800;

        document.getElementById("startBtn").onclick = () => {
          isRunning = true;
        };

        document.getElementById("stopBtn").onclick = () => {
          isRunning = false;
        };

        viewer.clock.onTick.addEventListener(() => {
          if (!isRunning) return;

          const rotationSpeed = (2 * Math.PI) / periodSeconds;
          heading += rotationSpeed * viewer.clock.clockStep;

          if (heading > Cesium.Math.TWO_PI) {
            heading -= Cesium.Math.TWO_PI;
          }

          viewer.camera.lookAt(
            centerPoint,
            new Cesium.HeadingPitchRange(heading, pitch, distance),
          );
        });
      })();
    </script>
  </body>
</html>
