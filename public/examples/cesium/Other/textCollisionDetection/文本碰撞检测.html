<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- 使用较新的 Cesium 版本 (1.117) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* 控制面板样式 */
      .control-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 8px;
        z-index: 1000;
        font-family: Arial, sans-serif;
      }

      .control-panel h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }

      .control-item {
        margin-bottom: 10px;
      }

      .control-item label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
      }

      .status {
        font-size: 12px;
        color: #ccc;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>

    <!-- 控制面板 -->
    <div class="control-panel">
      <h3>文本碰撞检测演示</h3>
      <div class="control-item">
        <button onclick="addLabels()">添加标签</button>
        <button onclick="clearLabels()">清除标签</button>
      </div>
      <div class="control-item">
        <label>
          <input
            type="checkbox"
            id="collisionToggle"
            checked
            onchange="toggleCollision()"
          />
          启用碰撞检测
        </label>
      </div>
      <div class="control-item">
        <label>标签数量: <span id="labelCount">0</span></label>
      </div>
      <div class="status" id="statusInfo">点击"添加标签"开始演示</div>
    </div>

    <script>
      // 初始化 Cesium
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        infoBox: false,
        selectionIndicator: false,
        terrainProvider: undefined, // 不加载地形以简化示例
      });

      // 设置相机视角
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(
          117.24951,
          31.468597,
          43443.9,
        ),
        orientation: {
          heading: Cesium.Math.toRadians(2.1),
          pitch: Cesium.Math.toRadians(-51.7),
          roll: 0.0,
        },
      });

      // 存储所有标签实体
      let labels = [];
      let collisionEnabled = true;

      // 生成随机位置
      function generateRandomPositions(count) {
        const positions = [];
        const bbox = [116.984788, 31.625909, 117.484068, 32.021504]; // 边界框

        for (let i = 0; i < count; i++) {
          const lng = bbox[0] + Math.random() * (bbox[2] - bbox[0]);
          const lat = bbox[1] + Math.random() * (bbox[3] - bbox[1]);
          const alt = 100 + Math.random() * 1000; // 随机高度

          positions.push({
            longitude: lng,
            latitude: lat,
            altitude: alt,
            index: i + 1,
          });
        }

        return positions;
      }

      // 检查两个标签是否重叠
      function checkLabelOverlap(label1, label2) {
        if (!label1.position || !label2.position) return false;

        // 获取屏幕坐标
        const canvasPosition1 = viewer.scene.cartesianToCanvasCoordinates(
          label1.position,
        );
        const canvasPosition2 = viewer.scene.cartesianToCanvasCoordinates(
          label2.position,
        );

        if (!canvasPosition1 || !canvasPosition2) return false;

        // 简单距离检测（可根据需要调整阈值）
        const distance = Math.sqrt(
          Math.pow(canvasPosition1.x - canvasPosition2.x, 2) +
            Math.pow(canvasPosition1.y - canvasPosition2.y, 2),
        );

        return distance < 50; // 50像素阈值
      }

      // 应用碰撞检测
      function applyCollisionDetection() {
        if (!collisionEnabled) {
          // 如果禁用碰撞检测，显示所有标签
          labels.forEach((label) => {
            label.show = true;
          });
          return;
        }

        // 隐藏所有标签
        labels.forEach((label) => {
          label.show = false;
        });

        // 按优先级排序（这里按索引顺序）
        const sortedLabels = [...labels].sort((a, b) => a.index - b.index);

        // 逐个检查并显示不重叠的标签
        for (let i = 0; i < sortedLabels.length; i++) {
          let canShow = true;

          // 检查当前标签是否与已显示的标签重叠
          for (let j = 0; j < i; j++) {
            if (
              sortedLabels[j].show &&
              checkLabelOverlap(sortedLabels[i], sortedLabels[j])
            ) {
              canShow = false;
              break;
            }
          }

          if (canShow) {
            sortedLabels[i].show = true;
          }
        }
      }

      // 添加标签
      function addLabels() {
        clearLabels();

        const startTime = Date.now();
        const count = 1000; // 标签数量
        const positions = generateRandomPositions(count);

        // 创建标签集合
        const labelCollection = viewer.scene.primitives.add(
          new Cesium.LabelCollection(),
        );

        positions.forEach((pos) => {
          const label = labelCollection.add({
            position: Cesium.Cartesian3.fromDegrees(
              pos.longitude,
              pos.latitude,
              pos.altitude,
            ),
            text: `第${pos.index}个`,
            font: "46px KaiTi", // 楷体
            fillColor: Cesium.Color.YELLOW,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            scale: 0.5,
          });

          // 保存引用以便后续操作
          label.index = pos.index;
          labels.push(label);
        });

        // 应用碰撞检测
        applyCollisionDetection();

        const endTime = Date.now();
        const usedTime = ((endTime - startTime) / 1000).toFixed(2);

        document.getElementById("labelCount").textContent = labels.length;
        document.getElementById("statusInfo").textContent =
          `生成${labels.length}条数据，共耗时${usedTime}秒`;
      }

      // 清除标签
      function clearLabels() {
        // 移除所有标签集合
        viewer.scene.primitives.removeAll();
        labels = [];
        document.getElementById("labelCount").textContent = "0";
        document.getElementById("statusInfo").textContent = "标签已清除";
      }

      // 切换碰撞检测
      function toggleCollision() {
        collisionEnabled = document.getElementById("collisionToggle").checked;
        applyCollisionDetection();
        document.getElementById("statusInfo").textContent = collisionEnabled
          ? "碰撞检测已启用"
          : "碰撞检测已禁用";
      }

      // 监听相机变化，重新应用碰撞检测
      viewer.camera.changed.addEventListener(() => {
        if (labels.length > 0) {
          setTimeout(applyCollisionDetection, 100); // 延迟执行以避免频繁计算
        }
      });

      // 页面加载完成后自动添加一些标签
      window.onload = () => {
        setTimeout(addLabels, 1000);
      };
    </script>
  </body>
</html>
