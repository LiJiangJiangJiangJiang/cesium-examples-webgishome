<!doctype html>

<head>
  <title>WebGIS之家</title>

  <link
    href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    let viewer = new Cesium.Viewer("map", {
      infoBox: false, // 信息框
      selectionIndicator: false, //选取指示器组件
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
      }),
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    let handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    // 取消双击事件-追踪该位置
    viewer.cesiumWidget.screenSpaceEventHandler.removeInputAction(
      Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK,
    );

    handler = new Cesium.ScreenSpaceEventHandler(
      viewer.scene._imageryLayerCollection,
    );
    document.getElementById("map").style.cursor = "crosshair";

    // 取消双击事件-追踪该位置
    viewer.cesiumWidget.screenSpaceEventHandler.removeInputAction(
      Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK,
    );
    // 鼠标事件
    handler = new Cesium.ScreenSpaceEventHandler(
      viewer.scene._imageryLayerCollection,
    );
    let positions = [];
    let tempPoints = [];
    let polygon = null;
    // let tooltip = document.getElementById("toolTip");
    let cartesian = null;
    let floatingPoint; //浮动点
    // tooltip.style.display = "block";

    handler.setInputAction((movement) => {
      // tooltip.style.left = movement.endPosition.x + 3 + "px";
      // tooltip.style.top = movement.endPosition.y - 25 + "px";
      // tooltip.innerHTML ="<p>单击开始，右击结束</p>";
      // cartesian = viewer.scene.pickPosition(movement.endPosition);
      let ray = viewer.camera.getPickRay(movement.endPosition);
      cartesian = viewer.scene.globe.pick(ray, viewer.scene);
      //cartesian = viewer.scene.camera.pickEllipsoid(movement.endPosition, viewer.scene.globe.ellipsoid);
      if (positions.length >= 2) {
        if (!Cesium.defined(polygon)) {
          polygon = new PolygonPrimitive(positions);
        } else {
          positions.pop();
          // cartesian.y += (1 + Math.random());
          positions.push(cartesian);
        }
        // tooltip.innerHTML="<p>"+distance+"米</p>";
      }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    handler.setInputAction((movement) => {
      // tooltip.style.display = "none";
      // cartesian = viewer.scene.pickPosition(movement.position);
      let ray = viewer.camera.getPickRay(movement.position);
      cartesian = viewer.scene.globe.pick(ray, viewer.scene);
      // cartesian = viewer.scene.camera.pickEllipsoid(movement.position, viewer.scene.globe.ellipsoid);
      if (positions.length == 0) {
        positions.push(cartesian.clone());
      }
      //positions.pop();
      positions.push(cartesian);
      //在三维场景中添加点
      let cartographic = Cesium.Cartographic.fromCartesian(
        positions[positions.length - 1],
      );
      let longitudeString = Cesium.Math.toDegrees(cartographic.longitude);
      let latitudeString = Cesium.Math.toDegrees(cartographic.latitude);
      let heightString = cartographic.height;
      tempPoints.push({
        lon: longitudeString,
        lat: latitudeString,
        hei: heightString,
      });
      floatingPoint = viewer.entities.add({
        name: "多边形面积",
        position: positions[positions.length - 1],
        point: {
          color: Cesium.Color.WHITE,
          pixelSize: 3,
          outlineColor: Cesium.Color.RED,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        },
      });
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    handler.setInputAction((movement) => {
      handler.destroy();
      positions.pop();
      //tempPoints.pop();
      // viewer.entities.remove(floatingPoint);
      // tooltip.style.display = "none";
      //在三维场景中添加点
      // let cartographic = Cesium.Cartographic.fromCartesian(positions[positions.length - 1]);
      // let longitudeString = Cesium.Math.toDegrees(cartographic.longitude);
      // let latitudeString = Cesium.Math.toDegrees(cartographic.latitude);
      // let heightString = cartographic.height;
      // tempPoints.push({ lon: longitudeString, lat: latitudeString ,hei:heightString});

      let textArea = getArea(tempPoints) + "平方公里";
      viewer.entities.add({
        name: "多边形面积",
        position: positions[positions.length - 1],
        // point: {
        //     pixelSize: 5,
        //     color: Cesium.Color.RED,
        //     outlineColor: Cesium.Color.WHITE,
        //     outlineWidth: 2,
        //     heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
        // },
        label: {
          text: textArea,
          font: "12px",
          fillColor: Cesium.Color.WHITE,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          outlineWidth: 1,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(20, -40),
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        },
      });
    }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

    let radiansPerDegree = Math.PI / 180.0; //角度转化为弧度(rad)
    let degreesPerRadian = 180.0 / Math.PI; //弧度转化为角度

    //计算多边形面积
    function getArea(points) {
      let res = 0;
      //拆分三角曲面
      for (let i = 0; i < points.length - 2; i++) {
        let j = (i + 1) % points.length;
        let k = (i + 2) % points.length;
        let totalAngle = Angle(points[i], points[j], points[k]);

        let dis_temp1 = distance(positions[i], positions[j]);
        let dis_temp2 = distance(positions[j], positions[k]);
        res += dis_temp1 * dis_temp2 * Math.abs(Math.sin(totalAngle));
        console.log(res);
      }

      return (res / 1000000.0).toFixed(4);
    }

    /*角度*/
    function Angle(p1, p2, p3) {
      let bearing21 = Bearing(p2, p1);
      let bearing23 = Bearing(p2, p3);
      let angle = bearing21 - bearing23;
      if (angle < 0) {
        angle += 360;
      }
      return angle;
    }
    /*方向*/
    function Bearing(from, to) {
      let lat1 = from.lat * radiansPerDegree;
      let lon1 = from.lon * radiansPerDegree;
      let lat2 = to.lat * radiansPerDegree;
      let lon2 = to.lon * radiansPerDegree;
      let angle = -Math.atan2(
        Math.sin(lon1 - lon2) * Math.cos(lat2),
        Math.cos(lat1) * Math.sin(lat2) -
          Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon1 - lon2),
      );
      if (angle < 0) {
        angle += Math.PI * 2.0;
      }
      angle = angle * degreesPerRadian; //角度
      return angle;
    }

    let PolygonPrimitive = (function () {
      function _(positions) {
        this.options = {
          name: "多边形",
          polygon: {
            hierarchy: [],
            // perPositionHeight : true,
            material: Cesium.Color.WHITE.withAlpha(0.5),
            // heightReference:20000
          },
        };

        this.hierarchy = { positions };
        this._init();
      }

      _.prototype._init = function () {
        let _self = this;
        let _update = function () {
          return _self.hierarchy;
        };
        //实时更新polygon.hierarchy
        this.options.polygon.hierarchy = new Cesium.CallbackProperty(
          _update,
          false,
        );
        viewer.entities.add(this.options);
      };

      return _;
    })();

    function distance(point1, point2) {
      let point1cartographic = Cesium.Cartographic.fromCartesian(point1);
      let point2cartographic = Cesium.Cartographic.fromCartesian(point2);
      /**根据经纬度计算出距离**/
      let geodesic = new Cesium.EllipsoidGeodesic();
      geodesic.setEndPoints(point1cartographic, point2cartographic);
      let s = geodesic.surfaceDistance;
      //console.log(Math.sqrt(Math.pow(distance, 2) + Math.pow(endheight, 2)));
      //返回两点之间的距离
      s = Math.sqrt(
        Math.pow(s, 2) +
          Math.pow(point2cartographic.height - point1cartographic.height, 2),
      );
      return s;
    }
  </script>
</body>
