<!doctype html>

<head>
  <title>WebGIS之家</title>

  <link
    href="https://file.webgishome.com/cesium/latest/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://file.webgishome.com/cesium/latest/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    let viewer = new Cesium.Viewer("map", {
      infoBox: false,
      selectionIndicator: false,
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
        url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer",
      }),
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({
        fragmentShader: `
                uniform sampler2D colorTexture;
                in vec2 v_textureCoordinates;
                uniform float tiltAngle;
                uniform float rainSize;
                uniform float rainSpeed;
                float hash(float x) {
                    return fract(sin(x * 133.3) * 13.13);
                }
                out vec4 fragColor;
                void main(void) {
                    float time = czm_frameNumber / rainSpeed;
                    vec2 resolution = czm_viewport.zw;
                    vec2 uv = (gl_FragCoord.xy * 2. - resolution.xy) / min(resolution.x, resolution.y);
                    vec3 c = vec3(.6, .7, .8);
                    float a = tiltAngle;
                    float si = sin(a), co = cos(a);
                    uv *= mat2(co, -si, si, co);
                    uv *= length(uv + vec2(0, 4.9)) * rainSize + 1.;
                    float v = 1. - sin(hash(floor(uv.x * 100.)) * 2.);
                    float b = clamp(abs(sin(20. * time * v + uv.y * (5. / (2. + v)))) - .95, 0., 1.) * 20.;
                    c *= v * b;
                    fragColor = mix(texture(colorTexture, v_textureCoordinates), vec4(c, 1), .5);
                }
                `,
        uniforms: {
          tiltAngle: -0.2, //倾斜角度
          rainSize: 0.8, // 雨大小
          rainSpeed: 200.0, // 雨速
        },
      }),
    );
  </script>
</body>
