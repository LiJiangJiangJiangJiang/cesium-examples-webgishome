<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    Cesium.Ion.defaultAccessToken =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

    let viewer = new Cesium.Viewer("map", {
      infoBox: false,
      selectionIndicator: false,
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    let hpr = new Cesium.HeadingPitchRoll();
    let trs = new Cesium.TranslationRotationScale();
    let particleSystem = "";
    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(104, 31),
    });
    viewer.clock.shouldAnimate = true;
    viewer.scene.globe.depthTestAgainstTerrain = false;
    const minimum = 10;
    const maximum = 20;
    particleSystem = viewer.scene.primitives.add(
      new Cesium.ParticleSystem({
        //ConeEmitter 锥形发射器，BoxEmitter 盒形发射器，SphereEmitter 球形发射器，CircleEmitter圆形发射器
        emitter: new Cesium.ConeEmitter(Cesium.Math.toRadians(45.0)),
        image:
          "https://webgishome-file.oss-cn-chengdu.aliyuncs.com/common/fire.png",
        startColor: Cesium.Color.RED,
        endColor: Cesium.Color.YELLOW,
        startScale: 1.0,
        endScale: 3.0,
        particleLife: 1.5,
        speed: 10.0,
        emissionRate: 200.0,
        imageSize: new Cesium.Cartesian2(25, 25),
        bursts: [
          new Cesium.ParticleBurst({ time: 0.0, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.1, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.2, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.3, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.4, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.5, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.6, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.7, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.8, minimum, maximum }),
          new Cesium.ParticleBurst({ time: 0.9, minimum, maximum }),
        ],
      }),
    );
    viewer.scene.preUpdate.addEventListener(function (scene, time) {
      particleSystem.modelMatrix = entity.computeModelMatrix(
        time,
        new Cesium.Matrix4(),
      );
      hpr = Cesium.HeadingPitchRoll.fromDegrees(0.0, 0.0, 0.0, hpr);
      trs.translation = Cesium.Cartesian3.fromElements(
        -4.0,
        0.0,
        1.4,
        new Cesium.Cartesian3(),
      );
      trs.rotation = Cesium.Quaternion.fromHeadingPitchRoll(
        hpr,
        new Cesium.Quaternion(),
      );

      particleSystem.emitterModelMatrix =
        Cesium.Matrix4.fromTranslationRotationScale(trs, new Cesium.Matrix4());
    });

    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(104, 31, 80),
      orientation: {
        heading: 5.916424, //相机绕z轴旋转。左右摇头。
        pitch: -1.265734, //相机绕y轴旋转。上下点头。
        roll: 0.0, //相机绕x轴旋转。左右歪头。
      },
      duration: 3,
    });
  </script>
</body>
