<!doctype html>

<head>
  <title>WebGIS Home</title>

  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>

  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    Cesium.Ion.defaultAccessToken =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYjQwOGRhYi01NDNjLTQ0ZjQtOTE3Mi1kNmI5ZGQ1ZGIwOTUiLCJpZCI6MjY2Njg4LCJpYXQiOjE3Njg4Nzc5NTJ9.UeZ4mFvm3tA9UH0Qxb6nDrSSw6qKRSqJmy2NFPxeBrE";

    let viewer = new Cesium.Viewer("map", {
      infoBox: false,
      selectionIndicator: false,
      navigation: false,
      animation: false,
      shouldAnimate: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
    });
    viewer._cesiumWidget._creditContainer.style.display = "none";

    viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({
        fragmentShader: `
                uniform sampler2D colorTexture;
                uniform sampler2D depthTexture;
                uniform float visibility;
                uniform vec4 fogColor;
                in vec2 v_textureCoordinates; 
                out vec4 fragColor;
                void main(void) 
                { 
                    vec4 origcolor = texture(colorTexture, v_textureCoordinates); 
                    float depth = czm_readDepth(depthTexture, v_textureCoordinates); 
                    vec4 depthcolor = texture(depthTexture, v_textureCoordinates); 
                    float f = visibility * (depthcolor.r - 0.3) / 0.2; 
                    if (f < 0.0) f = 0.0; 
                    else if (f > 1.0) f = 1.0; 
                    fragColor = mix(origcolor, fogColor, f); 
                }
            `,
        uniforms: {
          visibility: 0.1,
          fogColor: new Cesium.Color(0.8, 0.8, 0.8, 0.8),
        },
      }),
    );
  </script>
</body>
