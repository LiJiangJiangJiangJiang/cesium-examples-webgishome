<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS Home</title>
    <script src="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/ol.css"
    />
    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <button onclick="imageLayer()">影像图</button>
      <button onclick="terrainLayer()">地形图</button>
      <button onclick="terrainLayer()">标注图</button>
    </div>
    <script>
      let map = new ol.Map({
        target: "map",
        view: new ol.View({
          projection: "EPSG:4326",
          center: [103, 30],
          zoom: 5,
        }),
      });

      const imageLayer = () => {
        map.removeLayer(map.getAllLayers()[0]);
        map.addLayer(
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              url: "http://t3.tianditu.com/DataServer?T=img_w&tk=5a257cd2df1b3311723bd77b0de14baf&x={x}&y={y}&l={z}",
            }),
          }),
        );
      };
      const terrainLayer = () => {
        map.removeLayer(map.getAllLayers()[0]);
        map.addLayer(
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              url: "http://t4.tianditu.com/DataServer?T=ter_w&x={x}&y={y}&l={z}&tk=5a257cd2df1b3311723bd77b0de14baf",
            }),
          }),
        );
      };
      const labelLayer = () => {
        map.removeLayer(map.getAllLayers()[0]);
        map.addLayer(
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              url: "http://t4.tianditu.com/DataServer?T=cva_w&tk=5a257cd2df1b3311723bd77b0de14baf&x={x}&y={y}&l={z}",
            }),
          }),
        );
      };
      imageLayer();
    </script>
  </body>
</html>
