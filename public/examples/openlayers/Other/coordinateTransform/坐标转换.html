<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS之家</title>

    <script src="https://file.webgishome.com/ol/latest/dist/ol.js"></script>
    <link rel="stylesheet" href="https://file.webgishome.com/ol/latest/ol.css">
    <style>
        html,
        body,
        #map {
            width: 100vw;
            height: 100vh;
            margin: 0px;
            padding: 0px;
        }
    </style>

</head>

<body>
    <div id="map" style="cursor: crosshair;"></div>
    <div id="info" style="position: absolute;top:60px;left:10px;background-color: #fff;padding:10px;opacity: 0.9;">

        <script>
            let map = new ol.Map({
                target: "map",
                layers: [
                    new ol.layer.Tile({
                        source: new ol.source.XYZ({
                       // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
                        url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
                        })
                    })],
                view: new ol.View({
                    projection: "EPSG:4326",
                    center: [108.522097, 37.272848],
                    zoom: 4,
                })
            });
            let str = "";
            map.on("click", (e) => {
                str = "";
                //屏幕坐标
                str += "屏幕坐标：(" + e.pixel[0] + "," + e.pixel[1] + ")<br/>"

                str += "----------------------------------------------<br/>"
                //经纬度
                str += "经纬度：(" + e.coordinate[0] + "," + e.coordinate[1] + ")<br/>"

                str += "----------------------------------------------<br/>"
                //4326 转 3857 
                str += "4326 转 3857 ,方式1：(" + ol.proj.transform([e.coordinate[0], e.coordinate[1]], "EPSG:4326", "EPSG:3857") + ")<br/>"
                str += "4326 转 3857 ,方式2：(" + ol.proj.fromLonLat([e.coordinate[0], e.coordinate[1]]) + ")<br/>"

                let coordinate_3857 = ol.proj.fromLonLat([e.coordinate[0], e.coordinate[1]]);

                str += "----------------------------------------------<br/>"
                //3857 转 4326 
                str += "3857 转 4326 ,方式1：(" + ol.proj.transform([coordinate_3857[0], coordinate_3857[1]], "EPSG:3857", "EPSG:4326") + ")<br/>"
                str += "3857 转 4326 ,方式2：(" + ol.proj.toLonLat([coordinate_3857[0], coordinate_3857[1]]) + ")<br/>"

                document.getElementById("info").innerHTML = "<div>" + str + "</div>"

            });

        </script>
</body>

</html>
