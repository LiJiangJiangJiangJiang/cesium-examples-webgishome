<!doctype html>
<html>
  <head>
    <title>WebGIS Home</title>

    <script src="https://file.webgishome.com/ol/latest/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://file.webgishome.com/ol/latest/ol.css"
    />
    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map" class="map"></div>
    <div style="position: fixed; top: 80px; left: 10px; z-index: 999">
      <button onclick="startDragBox()">开始框选</button>
      <button onclick="cancelDragBox()">取消框选</button>
    </div>
    <span
      id="info"
      style="
        display: inline-block;
        position: fixed;
        top: 80px;
        right: 10px;
        max-width: 400px;
        background-color: #fff;
        padding: 10px;
        opacity: 0.9;
      "
    >
      框选要素。按F12查看控制台打印
    </span>
    <script>
      let map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            }),
          }),
        ],
        view: new ol.View({
          projection: "EPSG:3857",
          center: ol.proj.fromLonLat([108.522097, 37.272848]),
          zoom: 4,
        }),
      });
      let source = new ol.source.Vector({
        url: "https://file.webgishome.com/common/vectorSource/geojson/sichuan/sichuan.json",
        format: new ol.format.GeoJSON(),
      });

      let layer = new ol.layer.Vector();
      layer.setSource(source);

      map.addLayer(layer);

      let style = new ol.style.Style({
        fill: new ol.style.Fill({
          color: "rgba(255, 255, 255, 0.2)",
        }),
        stroke: new ol.style.Stroke({
          color: "#ffcc33",
          width: 2,
        }),
        image: new ol.style.Circle({
          radius: 7,
          fill: new ol.style.Fill({
            color: "#ffcc33",
          }),
        }),
      });

      let select = new ol.interaction.Select({
        condition: ol.events.condition.click, //将默认的singleClick声明为click，使点击无延迟
        style: style,
      });
      map.addInteraction(select);

      let dragBox = new ol.interaction.DragBox({
        condition: ol.events.condition.always, //直接框选。默认
        // condition: ol.events.condition.platformModifierKeyOnly //按住ctrl键框选
      });
      map.addInteraction(dragBox);
      dragBox.setActive(false);

      dragBox.on("boxstart", () => {
        select.getFeatures().clear();
      });
      dragBox.on("boxend", () => {
        let extent = dragBox.getGeometry().getExtent();
        layer
          .getSource()
          .forEachFeatureIntersectingExtent(extent, (feature) => {
            select.getFeatures().push(feature);
          });
        console.log("选中feature集合：", select.getFeatures().getArray());
        let names = select
          .getFeatures()
          .getArray()
          .map((item) => item.get("name"));
        console.log("names:", names);
        document.getElementById("info").innerHTML = `${names}`;
      });

      const startDragBox = () => {
        dragBox.setActive(true);

        map.getTargetElement().style.cursor =
          "url(http://pic.webgishome.com/common/cursor/crosshair_add.cur) 32 32,default";
      };

      const cancelDragBox = () => {
        dragBox.setActive(false);
        select.getFeatures().clear();
        document.getElementById("info").innerHTML =
          `框选要素。按F12查看控制台打印`;

        map.getTargetElement().style.cursor = "default";
      };
    </script>
  </body>
</html>
