<!doctype html>
<html>
  <head>
    <title>WebGIS之家</title>

    <script src="https://file.webgishome.com/ol/latest/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://file.webgishome.com/ol/latest/ol.css"
    />
    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map" class="map"></div>
    <script>
      let map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            }),
          }),
        ],
        view: new ol.View({
          projection: "EPSG:4326",
          center: [108.522097, 37.272848],
          zoom: 5,
        }),
      });

      let coordinate_start = [102.77305933312431, 32.30571264876045];
      let coordinate_end = [104.09057731013843, 27.589909088875146];

      let feature_point = new ol.Feature(new ol.geom.Point(coordinate_start));

      let geometry_polyline = new ol.geom.LineString([
        coordinate_start,
        coordinate_end,
      ]);

      map.addLayer(
        new ol.layer.Vector({
          source: new ol.source.Vector({
            features: [new ol.Feature(geometry_polyline), feature_point],
          }),
        }),
      );

      let translate = new ol.interaction.Translate({
        features: new ol.Collection([feature_point]),
      });
      map.addInteraction(translate);

      let coordinates_point;
      translate.on("translatestart", (e) => {
        coordinates_point = new ol.geom.Point(coordinate_end).getCoordinates();
      });
      translate.on("translating", (e) => {
        geometry_polyline.setCoordinates([e.coordinate, coordinates_point]);
      });

      map.on("pointermove", (e) => {
        map.getTargetElement().style.cursor = map.hasFeatureAtPixel(e.pixel)
          ? "pointer"
          : "";
      });
    </script>
  </body>
</html>
