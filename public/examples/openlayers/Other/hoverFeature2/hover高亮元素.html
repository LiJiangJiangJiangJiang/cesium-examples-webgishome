<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS之家</title>

    <script src="https://file.webgishome.com/ol/latest/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://file.webgishome.com/ol/latest/ol.css"
    />
    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <span
      id="info"
      style="
        display: inline-block;
        position: fixed;
        top: 80px;
        right: 10px;
        background-color: #fff;
        padding: 10px;
        opacity: 0.9;
      "
    >
      hover要素。按F12查看控制台打印
    </span>
    <script>
      let map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            }),
          }),
        ],
        view: new ol.View({
          projection: "EPSG:4326",
          center: [108.522097, 37.272848],
          zoom: 4,
        }),
      });

      // 创建样式
      let style_point_default = new ol.style.Style({
        fill: new ol.style.Fill({
          color: "rgba(255, 255, 255, 0.2)",
        }),
        stroke: new ol.style.Stroke({
          color: "white",
          width: 1,
        }),
        image: new ol.style.Icon({
          src: "https://pic.webgishome.com/common/point/001_20_0_ylw-pushpin.png",
          crossOrigin: "anonymous",
          scale: 0.5,
        }),
        text: new ol.style.Text({
          //位置
          textAlign: "left",
          //基准线
          textBaseline: "middle",
          //文字样式
          font: "normal 12px 微软雅黑",
          offsetX: 10,
          //文本内容
          text: "未命名点1",
          //文本填充样式（即文字颜色）
          fill: new ol.style.Fill({ color: "white" }),
          stroke: new ol.style.Stroke({ color: "rgba(0, 0, 0, 1)", width: 1 }),
        }),
      });

      let style_point_hover = new ol.style.Style({
        fill: new ol.style.Fill({
          color: "rgba(255, 255, 255, 0.2)",
        }),
        stroke: new ol.style.Stroke({
          color: "#00fffb",
          width: 1,
        }),
        image: new ol.style.Icon({
          src: "https://pic.webgishome.com/common/point/001_20_0_ylw-pushpin.png",
          crossOrigin: "anonymous",
          scale: 0.5,
        }),
        text: new ol.style.Text({
          //位置
          textAlign: "left",
          //基准线
          textBaseline: "middle",
          //文字样式
          font: "normal 12px 微软雅黑",
          offsetX: 10,
          //文本内容
          text: "未命名点1",
          //文本填充样式（即文字颜色）
          fill: new ol.style.Fill({ color: "#01E2E2" }),
          stroke: new ol.style.Stroke({ color: "rgba(0, 0, 0, 1)", width: 1 }),
        }),
      });

      // 创建点要素
      let feature_point = new ol.Feature(new ol.geom.Point([95.251, 33.436]));
      feature_point.setStyle(style_point_default);

      // 创建线要素
      let feature_polyline = new ol.Feature({
        name: "线要素",
        geometry: new ol.geom.LineString([
          [102.77305933312431, 32.30571264876045],
          [100.79873887988504, 29.589742736893342],
          [104.09057731013843, 27.589909088875146],
        ]),
        a: "要素属性a",
        myData: {
          b: "要素属性b",
        },
      });
      feature_polyline.setStyle(style_point_default);

      // 创建面要素
      let feature_polygon = new ol.Feature();
      let geometry_polygon = new ol.geom.Polygon([
        [
          [108.84162890875109, 33.83381858276036],
          [107.73067878549728, 30.686905116310314],
          [112.43022833317082, 29.34147880925039],
          [116.51604766262409, 31.71085905001513],
          [108.84162890875109, 33.83381858276036],
        ],
      ]);
      geometry_polygon.set("c", "单个geometry属性c");
      geometry_polygon.setProperties({
        a: "geometry属性a",
        b: "geometry属性b",
      });

      feature_polygon.setGeometry(geometry_polygon);
      feature_polygon.set("c", "单个feature属性c");
      feature_polygon.setProperties({ a: "feature属性a", b: "feature属性b" });

      feature_polygon.setStyle(style_point_default);

      // 创建数据源
      let source = new ol.source.Vector();
      source.addFeatures([feature_point, feature_polyline, feature_polygon]);

      // 创建图层
      let layer = new ol.layer.Vector();
      layer.setSource(source);

      // 添加图层
      map.addLayer(layer);

      let feature = null;
      map.on("pointermove", (e) => {
        console.log(e);

        console.log("鼠标pixel：", e.pixel);
        console.log("鼠标coordinate：", e.coordinate);

        if (feature) {
          feature.setStyle(style_point_default); //还原为默认样式
          feature = null;
        }
        feature = map.forEachFeatureAtPixel(e.pixel, (feature) => {
          return feature;
        });
        console.log("当前feature：", feature);
        if (feature) {
          // 设置要素样式
          feature.setStyle(style_point_hover);
        }
        console.log("当前geometry：", feature?.getGeometry());
        console.log("geometry类型：", feature?.getGeometry()?.getType());
        console.log("geometry获取单个属性：", feature?.getGeometry()?.get("c"));
        console.log(
          "geometry获取多个属性：",
          feature?.getGeometry()?.getProperties(),
        );
        console.log("geometry坐标：", feature?.getGeometry()?.getCoordinates());
        console.log("feature获取单个属性：", feature?.get("c"));
        console.log("feature获取多个属性：", feature?.getProperties());

        //设置鼠标样式
        map.getTargetElement().style.cursor = map.hasFeatureAtPixel(e.pixel)
          ? "pointer"
          : "";
      });
    </script>
  </body>
</html>
