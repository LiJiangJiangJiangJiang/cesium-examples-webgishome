<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS Home</title>

    <script src="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://webgishome-file.oss-cn-chengdu.aliyuncs.com/ol/v7.3.0/ol.css"
    />
    <style>
      html,
      body,
      #map {
        width: 100vw;
        height: 100vh;
        margin: 0px;
        padding: 0px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <script>
      let map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.XYZ({
              // url: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            }),
          }),

          // 点
          new ol.layer.Vector({
            source: new ol.source.Vector({
              features: new ol.format.GeoJSON().readFeatures({
                type: "FeatureCollection",
                features: [
                  {
                    type: "Feature",
                    properties: {
                      title: "点1",
                    },
                    geometry: {
                      type: "Point",
                      coordinates: [91.48879670091165, 37.83814884701121],
                    },
                  },
                ],
              }),
            }),
            style: new ol.style.Style({
              image: new ol.style.Circle({
                radius: 10,
                fill: new ol.style.Fill({
                  //矢量图层填充颜色，以及透明度
                  color: "rgba(33,194,219,0.9)",
                }),
                stroke: new ol.style.Stroke({
                  //边界样式
                  color: "rgba(100, 90, 209, 0.6)",
                  width: 4,
                }),
              }),
            }),
          }),

          // 文本
          new ol.layer.Vector({
            source: new ol.source.Vector({
              features: new ol.format.GeoJSON().readFeatures({
                type: "FeatureCollection",
                features: [
                  {
                    type: "Feature",
                    properties: {
                      title: "标注Abc",
                    },
                    geometry: {
                      type: "Point",
                      coordinates: [104, 39],
                    },
                  },
                ],
              }),
            }),
            style: new ol.style.Style({
              text: new ol.style.Text({
                //位置
                textAlign: "center",
                //基准线
                textBaseline: "middle",
                //文字样式
                font: "normal 18px 微软雅黑",
                // center: [104, 39],
                //文本内容
                text: "标注Abc",
                //文本填充样式（即文字颜色）
                fill: new ol.style.Fill({ color: "yellow" }),
                stroke: new ol.style.Stroke({
                  color: "rgba(71, 137, 227, 1)",
                  width: 2,
                }),
              }),
            }),
          }),
        ],
        view: new ol.View({
          projection: "EPSG:4326",
          center: [108.522097, 37.272848],
          zoom: 4,
        }),
      });
    </script>
  </body>
</html>
